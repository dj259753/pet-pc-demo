<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>Skills 接入</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: transparent;
      overflow: hidden;
      font-family: -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Microsoft YaHei', sans-serif;
      -webkit-app-region: no-drag;
    }

    .skills-container {
      width: 420px;
      background: #0f172a;
      border: 1px solid #334155;
      border-radius: 20px;
      box-shadow: 0 14px 38px rgba(0,0,0,0.5), inset 0 1px 0 rgba(255,255,255,0.08);
      overflow: hidden;
    }

    /* 标题栏 */
    .skills-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 16px 0;
      background: #1e293b;
      color: #f8fafc;
    }

    .skills-title {
      font-size: 15px;
      font-weight: bold;
      display: flex;
      align-items: center;
      gap: 6px;
      padding-bottom: 12px;
    }

    .skills-close {
      width: 24px; height: 24px;
      border-radius: 50%;
      border: none;
      background: #334155;
      color: #e2e8f0;
      font-size: 14px;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: background 0.2s;
      margin-bottom: 12px;
      flex-shrink: 0;
    }
    .skills-close:hover { background: #b91c1c; color: #fff; }

    /* Tab 栏 */
    .skills-tabs {
      display: flex;
      background: #1e293b;
      border-bottom: 1px solid #334155;
      padding: 0 16px;
      gap: 0;
    }
    .tab-btn {
      flex: 1;
      padding: 9px 0;
      border: none;
      background: transparent;
      color: rgba(255,255,255,0.45);
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      border-bottom: 2px solid transparent;
      transition: color 0.15s, border-color 0.15s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 5px;
    }
    .tab-btn.active {
      color: #a5b4fc;
      border-bottom-color: #6366f1;
    }
    .tab-btn:hover:not(.active) { color: rgba(255,255,255,0.7); }
    .tab-badge {
      background: rgba(255,255,255,0.1);
      padding: 1px 6px;
      border-radius: 8px;
      font-size: 10px;
      color: rgba(255,255,255,0.4);
    }
    .tab-btn.active .tab-badge {
      background: rgba(99,102,241,0.25);
      color: rgba(165,180,252,0.9);
    }

    /* 搜索栏 */
    .skills-search {
      padding: 8px 12px;
      border-bottom: 1px solid #334155;
      background: #0b1220;
    }
    .skills-search input {
      width: 100%;
      padding: 7px 12px;
      border: 1px solid #475569;
      border-radius: 10px;
      font-size: 12px;
      outline: none;
      background: #111827;
      color: #f8fafc;
      transition: border-color 0.2s, background 0.2s;
    }
    .skills-search input:focus { border-color: #6366f1; background: #0f172a; }
    .skills-search input::placeholder { color: #94a3b8; }

    /* 列表 */
    .skills-list {
      padding: 4px 12px 12px;
      height: 420px;
      overflow-y: auto;
      background: #0f172a;
    }
    .skills-list.hidden { display: none; }

    .skill-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 12px;
      border-radius: 12px;
      transition: background 0.15s;
      border-bottom: 1px solid rgba(255,255,255,0.04);
    }
    .skill-item:last-child { border-bottom: none; }
    .skill-item:hover { background: #1e293b; }

    .skill-icon {
      width: 38px; height: 38px;
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      font-size: 20px;
      flex-shrink: 0;
      background: #312e81;
    }

    .skill-info { flex: 1; min-width: 0; }

    .skill-name {
      font-size: 13px;
      font-weight: 600;
      color: rgba(255,255,255,0.9);
      display: flex; align-items: center; gap: 4px;
    }

    .skill-desc {
      font-size: 11px;
      color: rgba(255,255,255,0.45);
      margin-top: 2px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .skill-action {
      flex-shrink: 0;
      display: flex; gap: 6px; align-items: center;
    }

    .btn-installed {
      padding: 5px 10px; border-radius: 8px;
      border: 1px solid rgba(16,185,129,0.3);
      background: rgba(16,185,129,0.12);
      color: rgba(110,231,183,0.9);
      font-size: 11px; font-weight: 600;
      cursor: default; display: flex; align-items: center; gap: 4px;
    }
    .btn-config {
      padding: 5px 10px; border-radius: 8px;
      border: 1px solid rgba(99,102,241,0.3);
      background: rgba(99,102,241,0.12);
      color: rgba(165,180,252,0.9);
      font-size: 11px; font-weight: 600; cursor: pointer;
      display: flex; align-items: center; gap: 3px;
      transition: all 0.15s;
    }
    .btn-config:hover { background: rgba(99,102,241,0.2); transform: translateY(-1px); }
    .btn-uninstall {
      padding: 5px 10px; border-radius: 8px;
      border: 1px solid rgba(239,68,68,0.45);
      background: rgba(127,29,29,0.45);
      color: #fecaca; font-size: 11px; font-weight: 600; cursor: pointer;
      transition: all 0.15s;
    }
    .btn-uninstall:hover { background: rgba(185,28,28,0.65); color: #fff; transform: translateY(-1px); }
    .btn-install {
      padding: 5px 12px; border-radius: 8px;
      border: 1px solid rgba(99,102,241,0.3);
      background: linear-gradient(135deg, rgba(99,102,241,0.5), rgba(139,92,246,0.5));
      color: #fff; font-size: 11px; font-weight: 600; cursor: pointer;
      transition: transform 0.1s, box-shadow 0.2s;
    }
    .btn-install:hover { box-shadow: 0 2px 10px rgba(99,102,241,0.3); transform: translateY(-1px); }
    .btn-install:active { transform: scale(0.95); }
    .btn-installing {
      padding: 5px 12px; border-radius: 8px;
      border: 1px solid rgba(245,158,11,0.3);
      background: rgba(245,158,11,0.12);
      color: rgba(253,224,71,0.9);
      font-size: 11px; font-weight: 600; cursor: default;
      display: flex; align-items: center; gap: 4px;
    }
    .btn-error {
      padding: 5px 12px; border-radius: 8px;
      border: 1px solid rgba(239,68,68,0.3);
      background: rgba(239,68,68,0.12);
      color: rgba(248,113,113,0.9);
      font-size: 11px; font-weight: 600; cursor: pointer;
    }

    /* 热度标签 */
    .skill-heat {
      font-size: 10px;
      color: rgba(255,200,100,0.7);
      margin-top: 2px;
    }

    @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
    .spin { animation: spin 1s linear infinite; display: inline-block; }

    .loading-state {
      display: flex; align-items: center; justify-content: center;
      padding: 40px 0; color: rgba(255,255,255,0.4); font-size: 13px; gap: 8px;
    }
    .empty-state {
      text-align: center; padding: 30px 0;
      color: rgba(255,255,255,0.3); font-size: 12px;
    }

    .skills-list::-webkit-scrollbar { width: 6px; }
    .skills-list::-webkit-scrollbar-track { background: transparent; }
    .skills-list::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 3px; }
  </style>
</head>
<body>
  <div class="skills-container">
    <div class="skills-header">
      <div class="skills-title">🧩 Skills 技能</div>
      <button class="skills-close" id="btn-close" title="关闭">×</button>
    </div>

    <!-- Tab 栏 -->
    <div class="skills-tabs">
      <button class="tab-btn active" id="tab-installed" data-tab="installed">
        ✅ 已安装 <span class="tab-badge" id="badge-installed">0</span>
      </button>
      <button class="tab-btn" id="tab-store" data-tab="store">
        🛒 商店 <span class="tab-badge" id="badge-store">0</span>
      </button>
    </div>

    <div class="skills-search">
      <input type="text" id="search-input" placeholder="🔍 搜索技能...">
    </div>

    <!-- 已安装 Tab -->
    <div class="skills-list" id="list-installed">
      <div class="loading-state"><span class="spin">⏳</span> 加载中...</div>
    </div>

    <!-- 商店 Tab -->
    <div class="skills-list hidden" id="list-store">
      <div class="loading-state"><span class="spin">⏳</span> 加载中...</div>
    </div>
  </div>

  <script>
    let allInstalled = [];
    let allMarketplace = [];
    let searchQuery = '';
    let currentTab = 'installed';

    // ─── Tab 切换 ───
    document.querySelectorAll('.tab-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        currentTab = btn.dataset.tab;
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        document.getElementById('list-installed').classList.toggle('hidden', currentTab !== 'installed');
        document.getElementById('list-store').classList.toggle('hidden', currentTab !== 'store');
        render();
      });
    });

    function escapeHtml(str) {
      return String(str || '')
        .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;').replace(/'/g, '&#39;');
    }
    function normalizeText(str, fallback = '') {
      return String(str || '').replace(/\s+/g, ' ').trim() || fallback;
    }

    // ─── 加载数据 ───
    async function loadSkills() {
      try {
        const data = await window.skillsAPI.getSkills();
        allInstalled = data.installed || [];

        // 商店按 score（下载量/好评）降序排列，API 已按 score 返回，此处再确保排序
        allMarketplace = (data.marketplace || []).sort((a, b) => {
          const sa = Number(a.score || a.downloads || a.stars || 0);
          const sb = Number(b.score || b.downloads || b.stars || 0);
          return sb - sa;
        });

        // 更新 badge
        document.getElementById('badge-installed').textContent = allInstalled.length;
        document.getElementById('badge-store').textContent = allMarketplace.length;

        render();
      } catch (e) {
        console.error('加载 skills 失败:', e);
        document.getElementById('list-installed').innerHTML = '<div class="empty-state">⚠️ 加载失败，请重试</div>';
        document.getElementById('list-store').innerHTML = '<div class="empty-state">⚠️ 加载失败，请重试</div>';
      }
    }

    // ─── 过滤 ───
    function filterSkills(list) {
      if (!searchQuery) return list;
      const q = searchQuery.toLowerCase();
      return list.filter(s =>
        (s.displayName || '').toLowerCase().includes(q) ||
        (s.name || '').toLowerCase().includes(q) ||
        (s.desc || '').toLowerCase().includes(q)
      );
    }

    // ─── 渲染 ───
    function render() {
      renderInstalled();
      renderStore();
    }

    function renderInstalled() {
      const container = document.getElementById('list-installed');
      const filtered = filterSkills(allInstalled);
      if (filtered.length === 0) {
        container.innerHTML = '<div class="empty-state">' +
          (allInstalled.length === 0 ? '还没有安装任何技能<br><span style="font-size:11px;opacity:.6">切换到「商店」Tab 安装</span>' : '没有匹配的技能') +
          '</div>';
        return;
      }
      container.innerHTML = '';
      filtered.forEach(skill => container.appendChild(createSkillItem(skill)));
    }

    function renderStore() {
      const container = document.getElementById('list-store');
      const filtered = filterSkills(allMarketplace);
      if (filtered.length === 0) {
        container.innerHTML = '<div class="empty-state">' +
          (allMarketplace.length === 0 ? '暂无可用技能' : '没有匹配的技能') +
          '</div>';
        return;
      }
      container.innerHTML = '';
      filtered.forEach(skill => container.appendChild(createSkillItem(skill)));
    }

    // ─── 创建单个 skill 项 ───
    function createSkillItem(skill) {
      const item = document.createElement('div');
      item.className = 'skill-item';
      item.dataset.id = skill.id;

      let actionHtml;
      if (skill.installed) {
        actionHtml = `
          <div class="btn-installed">✅ 已装</div>
          <button class="btn-config" data-id="${escapeHtml(skill.id)}" data-name="${escapeHtml(skill.displayName)}">⚙️ 配置</button>
          <button class="btn-uninstall" data-id="${escapeHtml(skill.id)}" data-name="${escapeHtml(skill.displayName)}">卸载</button>
        `;
      } else {
        actionHtml = `<button class="btn-install" data-id="${escapeHtml(skill.id)}" data-source="${escapeHtml(skill.source)}">安装</button>`;
      }

      const safeName = escapeHtml(normalizeText(skill.displayName, '未命名技能'));
      const safeDesc = escapeHtml(normalizeText(skill.desc, '暂无描述'));
      const safeEmoji = normalizeText(skill.emoji, '🧩');

      // 热度指示（商店 skill 显示）
      const heatScore = skill.score || skill.downloads || skill.stars;
      const heatHtml = (!skill.installed && heatScore)
        ? `<div class="skill-heat">⭐ ${Number(heatScore).toLocaleString()}</div>`
        : '';

      item.innerHTML = `
        <div class="skill-icon">${safeEmoji}</div>
        <div class="skill-info">
          <div class="skill-name">${safeName}</div>
          <div class="skill-desc" title="${safeDesc}">${safeDesc}</div>
          ${heatHtml}
        </div>
        <div class="skill-action">${actionHtml}</div>
      `;

      item.querySelector('.btn-install')?.addEventListener('click', e => installSkill(skill, e.currentTarget));
      item.querySelector('.btn-config')?.addEventListener('click', () => configureSkill(skill));
      item.querySelector('.btn-uninstall')?.addEventListener('click', e => uninstallSkill(skill, e.currentTarget));

      return item;
    }

    // ─── 安装 ───
    async function installSkill(skill, btnEl) {
      const actionDiv = btnEl.closest('.skill-action');
      if (actionDiv) actionDiv.innerHTML = `<div class="btn-installing"><span class="spin">⏳</span> 安装中...</div>`;

      try {
        const result = await window.skillsAPI.installSkill(skill.id, skill.source);
        if (result.ok) {
          // 安装成功后切换到已安装 Tab
          await loadSkills();
          document.getElementById('tab-installed').click();
        } else {
          if (actionDiv) {
            actionDiv.innerHTML = `<button class="btn-error" title="${escapeHtml(result.error || '安装失败')}">❌ 重试</button>`;
            actionDiv.querySelector('.btn-error').addEventListener('click', () => installSkill(skill, actionDiv.querySelector('.btn-error')));
          }
        }
      } catch (e) {
        console.error('安装失败:', e);
        await loadSkills();
      }
    }

    // ─── 配置 ───
    function configureSkill(skill) {
      window.skillsAPI.configureSkill(skill.id, skill.displayName);
    }

    // ─── 卸载 ───
    async function uninstallSkill(skill, btnEl) {
      if (!confirm(`确认卸载「${skill.displayName}」吗？`)) return;
      btnEl.disabled = true;
      btnEl.textContent = '卸载中...';
      try {
        const result = await window.skillsAPI.uninstallSkill(skill.id);
        if (!result.ok) alert(`卸载失败：${result.error || '未知错误'}`);
      } catch (e) {
        alert(`卸载失败：${e.message || e}`);
      } finally {
        await loadSkills();
      }
    }

    // ─── 搜索 ───
    document.getElementById('search-input').addEventListener('input', e => {
      searchQuery = e.target.value.trim();
      render();
    });

    // ─── 关闭 ───
    document.getElementById('btn-close').addEventListener('click', () => window.skillsAPI?.hide());
    document.addEventListener('keydown', e => { if (e.key === 'Escape') window.skillsAPI?.hide(); });

    // ─── 启动 ───
    loadSkills();
  </script>
</body>
</html>
