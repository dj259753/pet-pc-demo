<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>Skills 接入</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: transparent;
      overflow: hidden;
      font-family: -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Microsoft YaHei', sans-serif;
      -webkit-app-region: no-drag;
    }

    .skills-container {
      width: 420px;
      background: #0f172a;
      border: 1px solid #334155;
      border-radius: 20px;
      box-shadow: 0 14px 38px rgba(0,0,0,0.5), inset 0 1px 0 rgba(255,255,255,0.08);
      overflow: hidden;
    }

    /* 标题栏 */
    .skills-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 16px 0;
      background: #1e293b;
      color: #f8fafc;
    }

    .skills-title {
      font-size: 15px;
      font-weight: bold;
      display: flex;
      align-items: center;
      gap: 6px;
      padding-bottom: 12px;
    }

    .skills-close {
      width: 24px; height: 24px;
      border-radius: 50%;
      border: none;
      background: #334155;
      color: #e2e8f0;
      font-size: 14px;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: background 0.2s;
      margin-bottom: 12px;
      flex-shrink: 0;
    }
    .skills-close:hover { background: #b91c1c; color: #fff; }

    /* Tab 栏 */
    .skills-tabs {
      display: flex;
      background: #1e293b;
      border-bottom: 1px solid #334155;
      padding: 0 16px;
      gap: 0;
    }
    .tab-btn {
      flex: 1;
      padding: 9px 0;
      border: none;
      background: transparent;
      color: rgba(255,255,255,0.45);
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      border-bottom: 2px solid transparent;
      transition: color 0.15s, border-color 0.15s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 5px;
    }
    .tab-btn.active {
      color: #a5b4fc;
      border-bottom-color: #6366f1;
    }
    .tab-btn:hover:not(.active) { color: rgba(255,255,255,0.7); }
    .tab-badge {
      background: rgba(255,255,255,0.1);
      padding: 1px 6px;
      border-radius: 8px;
      font-size: 10px;
      color: rgba(255,255,255,0.4);
    }
    .tab-btn.active .tab-badge {
      background: rgba(99,102,241,0.25);
      color: rgba(165,180,252,0.9);
    }

    /* 搜索栏 */
    .skills-search {
      padding: 8px 12px;
      border-bottom: 1px solid #334155;
      background: #0b1220;
    }
    .skills-search input {
      width: 100%;
      padding: 7px 12px;
      border: 1px solid #475569;
      border-radius: 10px;
      font-size: 12px;
      outline: none;
      background: #111827;
      color: #f8fafc;
      transition: border-color 0.2s, background 0.2s;
    }
    .skills-search input:focus { border-color: #6366f1; background: #0f172a; }
    .skills-search input::placeholder { color: #94a3b8; }

    /* 列表 */
    .skills-list {
      padding: 4px 12px 12px;
      height: 420px;
      overflow-y: auto;
      background: #0f172a;
    }
    .skills-list.hidden { display: none; }

    .skill-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 12px;
      border-radius: 12px;
      transition: background 0.15s;
      border-bottom: 1px solid rgba(255,255,255,0.04);
    }
    .skill-item:last-child { border-bottom: none; }
    .skill-item:hover { background: #1e293b; }

    .skill-icon {
      width: 38px; height: 38px;
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      font-size: 20px;
      flex-shrink: 0;
      background: #312e81;
    }

    .skill-info { flex: 1; min-width: 0; }

    .skill-name {
      font-size: 13px;
      font-weight: 600;
      color: rgba(255,255,255,0.9);
      display: flex; align-items: center; gap: 4px;
    }

    .skill-desc {
      font-size: 11px;
      color: rgba(255,255,255,0.45);
      margin-top: 2px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .skill-action {
      flex-shrink: 0;
      display: flex; gap: 6px; align-items: center;
    }

    .btn-installed {
      padding: 5px 10px; border-radius: 8px;
      border: 1px solid rgba(16,185,129,0.3);
      background: rgba(16,185,129,0.12);
      color: rgba(110,231,183,0.9);
      font-size: 11px; font-weight: 600;
      cursor: default; display: flex; align-items: center; gap: 4px;
    }
    .btn-config {
      padding: 5px 10px; border-radius: 8px;
      border: 1px solid rgba(99,102,241,0.3);
      background: rgba(99,102,241,0.12);
      color: rgba(165,180,252,0.9);
      font-size: 11px; font-weight: 600; cursor: pointer;
      display: flex; align-items: center; gap: 3px;
      transition: all 0.15s;
    }
    .btn-config:hover { background: rgba(99,102,241,0.2); transform: translateY(-1px); }
    .btn-uninstall {
      padding: 5px 10px; border-radius: 8px;
      border: 1px solid rgba(239,68,68,0.45);
      background: rgba(127,29,29,0.45);
      color: #fecaca; font-size: 11px; font-weight: 600; cursor: pointer;
      transition: all 0.15s;
    }
    .btn-uninstall:hover { background: rgba(185,28,28,0.65); color: #fff; transform: translateY(-1px); }
    .btn-install {
      padding: 5px 12px; border-radius: 8px;
      border: 1px solid rgba(99,102,241,0.3);
      background: linear-gradient(135deg, rgba(99,102,241,0.5), rgba(139,92,246,0.5));
      color: #fff; font-size: 11px; font-weight: 600; cursor: pointer;
      transition: transform 0.1s, box-shadow 0.2s;
    }
    .btn-install:hover { box-shadow: 0 2px 10px rgba(99,102,241,0.3); transform: translateY(-1px); }
    .btn-install:active { transform: scale(0.95); }
    .btn-installing {
      padding: 5px 12px; border-radius: 8px;
      border: 1px solid rgba(245,158,11,0.3);
      background: rgba(245,158,11,0.12);
      color: rgba(253,224,71,0.9);
      font-size: 11px; font-weight: 600; cursor: default;
      display: flex; align-items: center; gap: 4px;
    }
    .btn-error {
      padding: 5px 12px; border-radius: 8px;
      border: 1px solid rgba(239,68,68,0.3);
      background: rgba(239,68,68,0.12);
      color: rgba(248,113,113,0.9);
      font-size: 11px; font-weight: 600; cursor: pointer;
    }

    /* 热度标签 */
    .skill-heat {
      font-size: 10px;
      color: rgba(255,200,100,0.7);
      margin-top: 2px;
    }

    @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
    .spin { animation: spin 1s linear infinite; display: inline-block; }

    .loading-state {
      display: flex; align-items: center; justify-content: center;
      padding: 40px 0; color: rgba(255,255,255,0.4); font-size: 13px; gap: 8px;
    }
    .empty-state {
      text-align: center; padding: 30px 0;
      color: rgba(255,255,255,0.3); font-size: 12px;
    }

    .skills-list::-webkit-scrollbar { width: 6px; }
    .skills-list::-webkit-scrollbar-track { background: transparent; }
    .skills-list::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 3px; }

    /* Tooltip */
    .skills-container { position: relative; }
    #skill-tooltip {
      position: absolute;
      z-index: 9999;
      max-width: 260px;
      padding: 8px 12px;
      background: #1e293b;
      border: 1px solid #475569;
      border-radius: 10px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.5);
      font-size: 12px;
      line-height: 1.6;
      color: rgba(255,255,255,0.85);
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.15s;
      word-break: break-word;
    }
    #skill-tooltip.visible { opacity: 1; }
  </style>
</head>
<body>
  <div id="skill-tooltip"></div>
  <div class="skills-container">
    <div class="skills-header">
      <div class="skills-title">🧩 Skills 技能</div>
      <button class="skills-close" id="btn-close" title="关闭">×</button>
    </div>

    <!-- Tab 栏 -->
    <div class="skills-tabs">
      <button class="tab-btn active" id="tab-featured" data-tab="featured">
        ⭐ 推荐
      </button>
      <button class="tab-btn" id="tab-installed" data-tab="installed">
        ✅ 已安装 <span class="tab-badge" id="badge-installed">0</span>
      </button>
      <button class="tab-btn" id="tab-store" data-tab="store">
        🛒 商店 <span class="tab-badge" id="badge-store">0</span>
      </button>
    </div>

    <div class="skills-search">
      <input type="text" id="search-input" placeholder="🔍 搜索技能...">
    </div>

    <!-- 推荐 Tab -->
    <div class="skills-list" id="list-featured">
      <div class="loading-state"><span class="spin">⏳</span> 加载中...</div>
    </div>

    <!-- 已安装 Tab -->
    <div class="skills-list hidden" id="list-installed">
      <div class="loading-state"><span class="spin">⏳</span> 加载中...</div>
    </div>

    <!-- 商店 Tab -->
    <div class="skills-list hidden" id="list-store">
      <div class="loading-state"><span class="spin">⏳</span> 加载中...</div>
    </div>
  </div>

  <script>
    let allInstalled = [];
    let allMarketplace = [];   // 商店累积列表
    let searchQuery = '';
    let currentTab = 'featured';  // 默认推荐Tab
    let searchDebounceTimer = null;

    // ─── 分页状态 ───
    let storePage = 1;
    let storeHasMore = true;
    let storeLoading = false;
    let storeKeyword = '';

    // ─── 推荐列表（硬编码，可扩展） ───
    const FEATURED_SLUGS = [
      // ── 腾讯生态 ──
      { id: 'tencent-docs',          displayName: '腾讯文档',         emoji: '📄', desc: '提供完整的腾讯文档操作能力，支持创建、编辑、协作等全链路功能' },
      { id: 'tencent-meeting-skill', displayName: '腾讯会议',         emoji: '📹', desc: '腾讯会议全流程管理，创建/查询会议、发送邀请、管理参会者' },
      { id: 'tencent-news',          displayName: '腾讯新闻',         emoji: '📰', desc: '获取腾讯新闻热点资讯，支持分类浏览、关键词搜索、文章摘要' },
      // ── 邮件 ──
      { id: 'qq-mail-monitor',       displayName: 'QQ邮箱监控',       emoji: '📬', desc: 'QQ邮箱自动监控，支持定时检查新邮件、TTS语音播报提醒、邮件收发' },
      { id: 'email-management',      displayName: '邮件管理',         emoji: '✉️',  desc: '统一邮件收发管理，自动分类、摘要、回复草稿生成' },
      { id: 'email-daily-summary',   displayName: '智能体邮箱',       emoji: '🤖', desc: '自动登录邮箱（Gmail/Outlook/QQ Mail等）生成每日邮件摘要和重要提醒' },
      // ── Apple & macOS ──
      { id: 'apple-notes',           displayName: 'Apple 备忘录',     emoji: '🍎', desc: '读写 Apple Notes，创建、搜索、更新备忘录内容，支持文件夹管理' },
      { id: 'macos-gui-automation',  displayName: 'macOS 界面自动化', emoji: '🖱️', desc: '通过 AppleScript/osascript 自动化 macOS GUI 操作，控制窗口、菜单、应用' },
      // ── Office 套件 ──
      { id: 'microsoft-excel',       displayName: 'Excel 文件处理',   emoji: '📊', desc: '读写 Excel 文件，支持公式计算、数据透视表、图表生成' },
      { id: 'powerpoint-pptx',       displayName: 'PPT 演示文稿',     emoji: '📑', desc: '创建和编辑 PowerPoint 演示文稿，支持模板、动画、图表' },
      // ── 社交媒体 ──
      { id: 'xhs-cn',                displayName: '小红书',           emoji: '📕', desc: '小红书全链路运营：内容创作、笔记发布、搜索浏览、互动评论、数据分析' },
      // ── 浏览器 & 工具 ──
      { id: 'browser-use',           displayName: 'Browser Use',      emoji: '🌐', desc: '自动化浏览器交互，网页测试、表单填充、截图和数据提取' },
      { id: 'computer-use',          displayName: 'Computer Use',     emoji: '🖥️', desc: '无头Linux桌面完整操作，支持Xvfb+XFCE虚拟桌面与xdotool自动化控制' },
      { id: 'find-skills',           displayName: 'Find Skills',      emoji: '🔍', desc: '帮助发现和安装适合当前任务的 skill，智能推荐最匹配的能力扩展' },
    ];

    // ─── Tab 切换 ───
    document.querySelectorAll('.tab-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        currentTab = btn.dataset.tab;
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        document.getElementById('list-featured').classList.toggle('hidden', currentTab !== 'featured');
        document.getElementById('list-installed').classList.toggle('hidden', currentTab !== 'installed');
        document.getElementById('list-store').classList.toggle('hidden', currentTab !== 'store');
        if (currentTab === 'installed') renderInstalled();
      });
    });

    function escapeHtml(str) {
      return String(str || '')
        .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;').replace(/'/g, '&#39;');
    }
    function normalizeText(str, fallback = '') {
      return String(str || '').replace(/\s+/g, ' ').trim() || fallback;
    }

    // ─── 渲染推荐 Tab ───
    function renderFeatured() {
      const container = document.getElementById('list-featured');
      container.innerHTML = '';
      const installedIds = new Set([
        ...allInstalled.map(s => s.id),
        ...allInstalled.map(s => s.name),
      ]);
      FEATURED_SLUGS.forEach(fs => {
        const isInstalled = installedIds.has(fs.id);
        const skill = { ...fs, source: 'skillhub-store', installed: isInstalled };
        container.appendChild(createSkillItem(skill));
      });
    }

    // ─── 初始加载（第1页，同时拿已安装） ───
    async function loadSkills(keyword = '') {
      const isNewSearch = keyword !== storeKeyword;
      storeKeyword = keyword;

      if (isNewSearch) {
        storePage = 1;
        storeHasMore = true;
        allMarketplace = [];
      }

      await fetchStorePage(keyword, 1, /* reset= */ true);
    }

    // ─── 拉一页商店数据 ───
    async function fetchStorePage(keyword, page, reset = false) {
      if (storeLoading) return;
      storeLoading = true;

      const storeContainer = document.getElementById('list-store');

      if (reset) {
        storeContainer.innerHTML = '<div class="loading-state"><span class="spin">⏳</span> ' + (keyword ? '搜索中...' : '加载中...') + '</div>';
      } else {
        const loadingEl = document.createElement('div');
        loadingEl.className = 'loading-state loading-more';
        loadingEl.id = 'load-more-indicator';
        loadingEl.innerHTML = '<span class="spin">⏳</span> 加载更多...';
        storeContainer.appendChild(loadingEl);
      }

      try {
        const data = await window.skillsAPI.getSkills(keyword, page);

        if (page === 1 && data.installed) {
          allInstalled = data.installed;
          document.getElementById('badge-installed').textContent = allInstalled.length;
          renderInstalled();
          renderFeatured();  // 已安装状态变了，同步更新推荐Tab的按钮
        }

        const newItems = data.marketplace || [];
        storeHasMore = !!data.hasMore;
        storePage = page;

        if (reset) {
          allMarketplace = newItems;
          storeContainer.innerHTML = '';
          if (allMarketplace.length === 0) {
            storeContainer.innerHTML = '<div class="empty-state">' +
              (keyword ? `没有找到「${escapeHtml(keyword)}」相关技能` : '暂无可用技能') + '</div>';
          } else {
            allMarketplace.forEach(skill => storeContainer.appendChild(createSkillItem(skill)));
            if (storeHasMore) appendLoadMoreSentinel(storeContainer);
          }
        } else {
          document.getElementById('load-more-indicator')?.remove();
          if (newItems.length > 0) {
            allMarketplace.push(...newItems);
            newItems.forEach(skill => storeContainer.appendChild(createSkillItem(skill)));
          }
          if (storeHasMore) appendLoadMoreSentinel(storeContainer);
        }

        document.getElementById('badge-store').textContent = allMarketplace.length + (storeHasMore ? '+' : '');

      } catch (e) {
        console.error('加载商店失败:', e);
        document.getElementById('load-more-indicator')?.remove();
        if (reset) {
          storeContainer.innerHTML = '<div class="empty-state">⚠️ 加载失败，请重试</div>';
        }
      } finally {
        storeLoading = false;
      }
    }

    // ─── IntersectionObserver 哨兵（无限滚动） ───
    let sentinel = null;
    let sentinelObserver = null;

    function appendLoadMoreSentinel(container) {
      sentinel?.remove();
      sentinelObserver?.disconnect();

      sentinel = document.createElement('div');
      sentinel.style.height = '1px';
      container.appendChild(sentinel);

      sentinelObserver = new IntersectionObserver(entries => {
        if (entries[0].isIntersecting && storeHasMore && !storeLoading) {
          fetchStorePage(storeKeyword, storePage + 1, false);
        }
      }, { root: container, threshold: 0 });

      sentinelObserver.observe(sentinel);
    }

    // ─── 已安装前端过滤 ───
    function filterInstalled(list) {
      if (!searchQuery) return list;
      const q = searchQuery.toLowerCase();
      return list.filter(s =>
        (s.displayName || '').toLowerCase().includes(q) ||
        (s.name || '').toLowerCase().includes(q) ||
        (s.desc || '').toLowerCase().includes(q)
      );
    }

    function renderInstalled() {
      const container = document.getElementById('list-installed');
      const filtered = filterInstalled(allInstalled);
      if (filtered.length === 0) {
        container.innerHTML = '<div class="empty-state">' +
          (allInstalled.length === 0
            ? '还没有安装任何技能<br><span style="font-size:11px;opacity:.6">切换到「商店」Tab 安装</span>'
            : '没有匹配的技能') +
          '</div>';
        return;
      }
      container.innerHTML = '';
      filtered.forEach(skill => container.appendChild(createSkillItem(skill)));
    }

    function render() { renderInstalled(); }

    // ─── 创建单个 skill 项 ───
    function createSkillItem(skill) {
      const item = document.createElement('div');
      item.className = 'skill-item';
      item.dataset.id = skill.id;

      let actionHtml;
      if (skill.installed) {
        actionHtml = `
          <div class="btn-installed">✅ 已装</div>
          <button class="btn-config" data-id="${escapeHtml(skill.id)}" data-name="${escapeHtml(skill.displayName)}">⚙️ 配置</button>
          <button class="btn-uninstall" data-id="${escapeHtml(skill.id)}" data-name="${escapeHtml(skill.displayName)}">卸载</button>
        `;
      } else {
        actionHtml = `<button class="btn-install" data-id="${escapeHtml(skill.id)}" data-source="${escapeHtml(skill.source)}">安装</button>`;
      }

      const safeName = escapeHtml(normalizeText(skill.displayName, '未命名技能'));
      const safeDesc = escapeHtml(normalizeText(skill.desc, '暂无描述'));
      const safeEmoji = normalizeText(skill.emoji, '🧩');

      // 热度指示（商店 skill 显示）
      const heatScore = skill.score || skill.downloads || skill.stars;
      const heatHtml = (!skill.installed && heatScore)
        ? `<div class="skill-heat">⭐ ${Number(heatScore).toLocaleString()}</div>`
        : '';

      item.innerHTML = `
        <div class="skill-icon">${safeEmoji}</div>
        <div class="skill-info">
          <div class="skill-name">${safeName}</div>
          <div class="skill-desc" data-full-desc="${safeDesc}" title="">${safeDesc}</div>
          ${heatHtml}
        </div>
        <div class="skill-action">${actionHtml}</div>
      `;

      item.querySelector('.btn-install')?.addEventListener('click', e => installSkill(skill, e.currentTarget));
      item.querySelector('.btn-config')?.addEventListener('click', () => configureSkill(skill));
      item.querySelector('.btn-uninstall')?.addEventListener('click', e => uninstallSkill(skill, e.currentTarget));

      return item;
    }

    // ─── 安装 ───
    async function installSkill(skill, btnEl) {
      const actionDiv = btnEl.closest('.skill-action');
      if (actionDiv) actionDiv.innerHTML = `<div class="btn-installing"><span class="spin">⏳</span> 安装中...</div>`;

      try {
        const result = await window.skillsAPI.installSkill(skill.id, skill.source);
        if (result.ok) {
          // 安装成功：留在原 Tab，刷新数据让按钮变成「已装+配置+卸载」状态
          await loadSkills(storeKeyword);
        } else {
          if (actionDiv) {
            actionDiv.innerHTML = `<button class="btn-error" title="${escapeHtml(result.error || '安装失败')}">❌ 重试</button>`;
            actionDiv.querySelector('.btn-error').addEventListener('click', () => installSkill(skill, actionDiv.querySelector('.btn-error')));
          }
        }
      } catch (e) {
        console.error('安装失败:', e);
        await loadSkills(storeKeyword);
      }
    }

    // ─── 配置 ───
    function configureSkill(skill) {
      window.skillsAPI.configureSkill(skill.id, skill.displayName);
    }

    // ─── 卸载 ───
    async function uninstallSkill(skill, btnEl) {
      if (!confirm(`确认卸载「${skill.displayName}」吗？`)) return;
      btnEl.disabled = true;
      btnEl.textContent = '卸载中...';
      try {
        const result = await window.skillsAPI.uninstallSkill(skill.id);
        if (!result.ok) alert(`卸载失败：${result.error || '未知错误'}`);
      } catch (e) {
        alert(`卸载失败：${e.message || e}`);
      } finally {
        await loadSkills(storeKeyword);
      }
    }

    // ─── 搜索（debounce 400ms，重置分页后走后端全量搜索） ───
    document.getElementById('search-input').addEventListener('input', e => {
      searchQuery = e.target.value.trim();
      clearTimeout(searchDebounceTimer);
      // 已安装 Tab：本地即时过滤
      renderInstalled();
      // 商店：debounce 后重置分页重新搜索
      searchDebounceTimer = setTimeout(() => {
        loadSkills(searchQuery);
      }, 400);
    });

    // ─── 关闭 ───
    document.getElementById('btn-close').addEventListener('click', () => window.skillsAPI?.hide());
    document.addEventListener('keydown', e => { if (e.key === 'Escape') window.skillsAPI?.hide(); });

    // ─── Tooltip（hover 描述时展示完整文字） ───
    const tooltip = document.getElementById('skill-tooltip');
    let tooltipTimer = null;

    document.addEventListener('mouseover', e => {
      const el = e.target.closest('.skill-desc[data-full-desc]');
      if (!el) return;
      const text = el.dataset.fullDesc;
      if (!text || el.scrollWidth <= el.clientWidth) return;

      clearTimeout(tooltipTimer);
      tooltipTimer = setTimeout(() => {
        tooltip.textContent = text;
        tooltip.classList.add('visible');
        positionTooltip(e);
      }, 300);
    });

    document.addEventListener('mousemove', e => {
      if (!tooltip.classList.contains('visible')) return;
      positionTooltip(e);
    });

    document.addEventListener('mouseout', e => {
      const el = e.target.closest('.skill-desc[data-full-desc]');
      if (!el) return;
      clearTimeout(tooltipTimer);
      tooltip.classList.remove('visible');
    });

    function positionTooltip(e) {
      const container = document.querySelector('.skills-container');
      const cRect = container.getBoundingClientRect();
      const pad = 8;
      const tw = tooltip.offsetWidth || 260;
      const th = tooltip.offsetHeight || 60;

      // 鼠标相对容器的坐标
      let x = e.clientX - cRect.left + 10;
      let y = e.clientY - cRect.top + 16;

      // 右边界溢出 → 向左
      if (x + tw > cRect.width - pad) x = e.clientX - cRect.left - tw - 8;
      // 左边界
      if (x < pad) x = pad;
      // 下边界溢出 → 向上
      if (y + th > cRect.height - pad) y = e.clientY - cRect.top - th - 8;
      // 上边界
      if (y < pad) y = pad;

      tooltip.style.left = x + 'px';
      tooltip.style.top  = y + 'px';
    }

    // ─── 启动 ───
    loadSkills();
  </script>
</body>
</html>
