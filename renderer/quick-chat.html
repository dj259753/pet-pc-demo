<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>对话</title>
  <!-- Markdown 渲染 + 代码高亮 + 安全过滤（本地 vendor，避免 CDN 网络延迟） -->
  <script src="vendor/marked.min.js"></script>
  <script src="vendor/purify.min.js"></script>
  <link rel="stylesheet" href="vendor/hljs-github-dark.min.css">
  <script src="vendor/hljs-core.min.js"></script>
  <script src="vendor/hljs-js.min.js"></script>
  <script src="vendor/hljs-py.min.js"></script>
  <script src="vendor/hljs-bash.min.js"></script>
  <script src="vendor/hljs-json.min.js"></script>
  <script>
    // 注册语言别名（如果 hljs 可用）
    if (typeof hljs !== 'undefined') {
      const safeLang = (name) => hljs.getLanguage(name) ? () => hljs.getLanguage(name) : () => ({});
      try { hljs.registerLanguage('js', safeLang('javascript')); } catch {}
      try { hljs.registerLanguage('ts', safeLang('javascript')); } catch {}
      try { hljs.registerLanguage('typescript', safeLang('javascript')); } catch {}
      try { hljs.registerLanguage('py', safeLang('python')); } catch {}
      try { hljs.registerLanguage('sh', safeLang('bash')); } catch {}
      try { hljs.registerLanguage('zsh', safeLang('bash')); } catch {}
      try { hljs.registerLanguage('shell', safeLang('bash')); } catch {}
      try { hljs.registerLanguage('yaml', safeLang('json')); } catch {}
      try { hljs.registerLanguage('yml', safeLang('json')); } catch {}
    }
  </script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --panel-bg: #f7f8fb;
      --panel-elev-1: #ffffff;
      --panel-elev-2: #f3f5f9;
      --border: #e4e8f0;
      --border-soft: #ebeff5;
      --primary: #5b7cfa;
      --primary-hover: #4f70f0;
      --text: #1f2937;
      --text-secondary: #5b6475;
      --text-dim: #8b95a7;
      --user-bubble: #e9efff;
      --ai-bubble: #ffffff;
      --radius: 12px;
    }

    html, body {
      height: 100%;
      background: #eef2f8;
      font-family: -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Microsoft YaHei', sans-serif;
      color: var(--text);
      overflow: hidden;
    }

    /* ─── 自绘标题栏 ─── */
    .titlebar {
      -webkit-app-region: drag;
      height: 48px;
      display: flex;
      align-items: center;
      padding: 0 16px 0 80px;
      background: var(--panel-elev-1);
      border-bottom: 1px solid var(--border);
      box-shadow: 0 1px 0 rgba(15, 23, 42, 0.02);
      user-select: none;
      flex-shrink: 0;
    }
    .titlebar-title { font-size: 14px; font-weight: 600; color: var(--text); flex: 1; }
    .titlebar-subtitle { font-size: 11px; color: var(--text-secondary); margin-left: 8px; font-weight: 400; }
    .titlebar-btn {
      -webkit-app-region: no-drag;
      width: 28px; height: 28px; border: none;
      background: var(--panel-elev-2); border-radius: 8px;
      border: 1px solid var(--border-soft); cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      font-size: 16px; color: var(--text-secondary);
      transition: background 0.15s, color 0.15s;
    }
    .titlebar-btn:hover { background: #e9eef8; color: var(--text); }

    /* ─── 主容器 ─── */
    .container { display: flex; flex-direction: column; height: 100%; position: relative; }
    body.compact-mode .titlebar,
    body.compact-mode .messages,
    body.compact-mode #new-msg-btn,
    body.compact-mode #attachments-bar,
    body.compact-mode .shortcut-hint {
      display: none !important;
    }
    body.compact-mode {
      background: transparent !important;
    }
    body.compact-mode .container {
      background: transparent !important;
      border: 0 !important;
      box-shadow: none !important;
    }
    body.compact-mode .input-area {
      left: 14px;
      right: 14px;
      bottom: 6px;
      padding: 0;
      border: 0 !important;
      background: transparent !important;
      box-shadow: none !important;
      backdrop-filter: none !important;
      -webkit-backdrop-filter: none !important;
    }
    body.compact-mode .input-area textarea {
      min-height: 56px;
      max-height: 56px;
      overflow-y: auto;
      padding-right: 130px;
    }
    body.compact-mode .send-btn {
      right: 14px;
      bottom: 11px;
    }
    body.compact-mode .attach-btn {
      right: 54px;
      bottom: 11px;
    }

    /* ─── 消息列表 ─── */
    .messages {
      flex: 1; overflow-y: auto; overflow-x: hidden;
      padding: 14px 18px 180px; display: flex; flex-direction: column; gap: 12px;
      background: var(--panel-bg);
    }
    .messages::-webkit-scrollbar { width: 5px; }
    .messages::-webkit-scrollbar-track { background: transparent; }
    .messages::-webkit-scrollbar-thumb { background: #343b47; border-radius: 3px; }

    /* ─── 消息气泡 ─── */
    .msg { display: flex; align-items: flex-start; gap: 10px; max-width: 88%; animation: msgIn 0.25s ease; }
    .msg.user { align-self: flex-end; flex-direction: row-reverse; }
    .msg.ai { align-self: flex-start; }

    .msg-avatar {
      width: 34px; height: 34px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 18px; flex-shrink: 0; border: 1px solid var(--border); overflow: hidden;
    }
    .msg-avatar img { width: 100%; height: 100%; object-fit: cover; }
    .msg.user .msg-avatar { background: #324066; }
    .msg.ai .msg-avatar { background: transparent; }

    .msg-bubble {
      padding: 10px 14px; border-radius: var(--radius);
      font-size: 14px; line-height: 1.6; word-break: break-word;
      border: 1px solid var(--border); position: relative;
      min-width: 40px;
      box-shadow: 0 4px 14px rgba(15, 23, 42, 0.06);
    }
    .msg.user .msg-bubble {
      background: var(--user-bubble); color: var(--text);
      border: 1px solid #d4ddff; border-bottom-right-radius: 6px;
      white-space: pre-wrap;
    }
    .msg.ai .msg-bubble {
      background: var(--ai-bubble); color: var(--text);
      border: 1px solid #e6ebf3; border-bottom-left-radius: 6px;
    }

    /* 思考中动画 */
    .msg.ai .msg-bubble.thinking { color: var(--text-secondary); }
    .thinking-dots::after { content: ''; animation: dots 1.2s steps(4, end) infinite; }
    @keyframes dots { 0% { content: ''; } 25% { content: '.'; } 50% { content: '..'; } 75% { content: '...'; } }
    @keyframes msgIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

    /* ─── 流式光标 ─── */
    .streaming-cursor {
      display: inline-block; width: 2px; height: 16px;
      background: var(--primary); margin-left: 2px;
      vertical-align: text-bottom; animation: blink-cursor 1s step-end infinite;
    }
    @keyframes blink-cursor { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }

    /* ─── 流式气泡（纯文本模式，避免重渲染 Markdown） ─── */
    .streaming-bubble {
      white-space: pre-wrap;
      word-break: break-word;
    }
    .streaming-text {
      color: var(--text);
      font-size: 14px;
      line-height: 1.6;
      white-space: pre-wrap;
      word-break: break-word;
    }

    /* ─── final 升级淡入 ─── */
    @keyframes fadeMd {
      from { opacity: 0.4; }
      to   { opacity: 1; }
    }
    .md-fade-in {
      animation: fadeMd 0.28s ease forwards;
    }

    /* ─── 新消息提示按钮 ─── */
    #new-msg-btn {
      position: fixed;
      bottom: 80px;
      left: 50%;
      transform: translateX(-50%);
      background: var(--primary);
      color: #fff;
      border: none;
      border-radius: 999px;
      padding: 6px 16px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      box-shadow: 0 8px 20px rgba(91,124,250,0.28);
      z-index: 100;
      display: none;
      animation: slideInBlock 0.18s ease;
      white-space: nowrap;
    }
    #new-msg-btn:hover { background: var(--primary-hover); }

    /* ─── 消息复制按钮（悬浮） ─── */
    .msg-copy-btn {
      position: absolute; top: 6px; right: 6px;
      width: 26px; height: 26px; border: none; border-radius: 6px;
      background: rgba(91, 100, 117, 0.08); color: var(--text-dim);
      cursor: pointer; display: none; align-items: center; justify-content: center;
      font-size: 13px; transition: background 0.15s; z-index: 1;
    }
    .msg-bubble:hover .msg-copy-btn { display: flex; }
    .msg-copy-btn:hover { background: rgba(91, 100, 117, 0.16); color: var(--text); }
    .msg-copy-btn.copied { color: #22c55e; }

    /* ─── Think 可折叠 ─── */
    .think-block {
      margin: 0 0 8px 0; border-radius: 8px;
      border: 1px solid rgba(139,92,246,0.2);
      background: rgba(139,92,246,0.06); overflow: hidden;
    }
    .think-header {
      display: flex; align-items: center; gap: 6px;
      padding: 7px 12px; border: none; width: 100%;
      background: transparent; color: #a78bfa;
      font-size: 12px; font-weight: 500; cursor: pointer; text-align: left;
      transition: background 0.15s;
    }
    .think-header:hover { background: rgba(139,92,246,0.1); }
    .think-arrow { font-size: 10px; transition: transform 0.2s; }
    .think-block.open .think-arrow { transform: rotate(90deg); }
    .think-content {
      display: none; padding: 8px 12px;
      font-size: 13px; line-height: 1.6; color: var(--text-secondary);
      border-top: 1px solid rgba(139,92,246,0.15);
    }
    .think-block.open .think-content { display: block; }

    /* ─── 工具调用卡片 ─── */
    .tool-card {
      margin: 4px 0; padding: 8px 12px; border-radius: 8px;
      border: 1px solid rgba(59,130,246,0.2);
      background: rgba(59,130,246,0.06); font-size: 13px;
    }
    .tool-card-header {
      display: flex; justify-content: space-between; align-items: center;
    }
    .tool-card-title { display: flex; align-items: center; gap: 6px; font-weight: 500; color: #93c5fd; }
    .tool-card-icon { font-size: 14px; }
    .tool-card-status { color: #22c55e; font-weight: 600; font-size: 12px; }
    .tool-card-spinner {
      width: 14px; height: 14px; border: 2px solid rgba(59,130,246,0.3);
      border-top-color: #60a5fa; border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    .tool-card-detail {
      margin-top: 4px; font-size: 11px; color: var(--text-dim);
      word-break: break-all; max-height: 60px; overflow: hidden;
    }
    .tool-card-output {
      margin-top: 6px; padding: 6px 8px; border-radius: 4px;
      background: #1e1e1e; color: #d4d4d4;
      font-family: 'SF Mono', Menlo, monospace; font-size: 12px;
      line-height: 1.5; white-space: pre-wrap; overflow: hidden;
      max-height: 120px;
    }
    .tool-card.expandable { cursor: pointer; }
    .tool-card.expandable:hover { background: rgba(59,130,246,0.1); }
    .tool-card.expanded .tool-card-output { max-height: none; }

    /* ─── 过程提示行（非气泡） ─── */
    .process-tip {
      align-self: center;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 6px 12px;
      border-radius: 999px;
      border: 1px solid rgba(99,102,241,0.32);
      background: rgba(99,102,241,0.14);
      color: #c7d2fe;
      font-size: 12px;
      line-height: 1;
      max-width: 92%;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .process-tip::before {
      content: '';
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #818cf8;
      box-shadow: 0 0 0 0 rgba(129,140,248,0.6);
      animation: processPulse 1.6s infinite;
      flex-shrink: 0;
    }
    @keyframes processPulse {
      0% { box-shadow: 0 0 0 0 rgba(129,140,248,0.6); }
      70% { box-shadow: 0 0 0 8px rgba(129,140,248,0); }
      100% { box-shadow: 0 0 0 0 rgba(129,140,248,0); }
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* ─── Markdown 内容样式 ─── */
    .md-content { white-space: normal; }
    .md-content p { margin: 0; }
    .md-content p + p { margin-top: 8px; }
    .md-content ul, .md-content ol { margin: 4px 0; padding-left: 20px; }
    .md-content li { margin: 2px 0; }
    .md-content a { color: #60a5fa; text-decoration: none; }
    .md-content a:hover { text-decoration: underline; }
    .md-content strong { font-weight: 600; }
    .md-content em { font-style: italic; }
    .md-content h1, .md-content h2, .md-content h3, .md-content h4 {
      margin: 12px 0 4px; font-weight: 600; line-height: 1.4;
    }
    .md-content h1 { font-size: 1.25em; }
    .md-content h2 { font-size: 1.12em; }
    .md-content h3 { font-size: 1.05em; }
    .md-content h4 { font-size: 1em; }
    .md-content hr { border: none; border-top: 1px solid var(--border); margin: 12px 0; }
    .md-content blockquote {
      border-left: 3px solid rgba(255,255,255,0.15);
      margin: 8px 0; padding: 4px 12px; color: var(--text-secondary);
    }
    .md-content table { border-collapse: collapse; margin: 8px 0; font-size: 13px; }
    .md-content th, .md-content td { border: 1px solid var(--border); padding: 6px 10px; text-align: left; }
    .md-content th { font-weight: 600; background: rgba(255,255,255,0.04); }
    .md-content img { max-width: 100%; border-radius: 8px; margin: 4px 0; }

    /* 行内代码 */
    .md-content :not(pre) > code {
      background: rgba(255,255,255,0.08); padding: 2px 5px; border-radius: 4px;
      font-family: 'SF Mono', Menlo, monospace; font-size: 0.9em;
    }

    /* 代码块 */
    .code-block-wrap {
      margin: 8px 0; border-radius: 8px; overflow: hidden;
      background: #1e1e1e; border: 1px solid #333;
    }
    .code-block-header {
      display: flex; justify-content: space-between; align-items: center;
      padding: 6px 12px; background: rgba(255,255,255,0.04);
      font-size: 11px; color: rgba(255,255,255,0.45);
      font-family: 'SF Mono', Menlo, monospace;
    }
    .code-copy-btn {
      border: none; background: rgba(255,255,255,0.08); color: rgba(255,255,255,0.5);
      border-radius: 4px; padding: 2px 8px; font-size: 11px; cursor: pointer;
      transition: background 0.15s, color 0.15s;
    }
    .code-copy-btn:hover { background: rgba(255,255,255,0.16); color: #fff; }
    .code-copy-btn.copied { color: #22c55e; }
    .code-block-wrap pre {
      margin: 0; padding: 12px; overflow-x: auto;
      font-family: 'SF Mono', Menlo, monospace; font-size: 13px;
      line-height: 1.5; tab-size: 2;
    }
    .code-block-wrap code { white-space: pre; }

    /* ─── 欢迎占位 ─── */
    .welcome {
      flex: 1; display: flex; flex-direction: column; align-items: center;
      justify-content: center; gap: 8px; color: var(--text-secondary); user-select: none;
    }
    .welcome-emoji { font-size: 48px; margin-bottom: 4px; }
    .welcome-text { font-size: 15px; font-weight: 500; color: var(--text); }
    .welcome-hint { font-size: 12px; color: var(--text-dim); }

    /* ─── 输入区域 ─── */
    .input-area {
      position: absolute;
      left: 16px;
      right: 16px;
      bottom: 14px;
      display: block;
      padding: 10px;
      border-radius: 18px;
      border: 0.5px solid rgba(255,255,255,0.75);
      background: rgba(255,255,255,0.72);
      box-shadow: 0 12px 30px rgba(15, 23, 42, 0.14);
      backdrop-filter: blur(16px) saturate(120%);
      -webkit-backdrop-filter: blur(16px) saturate(120%);
      z-index: 20;
    }
    .attach-btn {
      position: absolute;
      right: 98px;
      bottom: 22px;
      width: 34px;
      height: 34px;
      border-radius: 10px;
      border: 1px solid rgba(0,0,0,0.1);
      background: rgba(255,255,255,0.95);
      color: var(--text-secondary);
      font-size: 16px;
      cursor: pointer;
      transition: background 0.2s, color 0.2s;
      z-index: 2;
    }
    .expand-btn {
      position: absolute;
      right: 94px;
      top: 50%;
      transform: translateY(-50%);
      width: 34px;
      height: 34px;
      border-radius: 10px;
      border: 1px solid rgba(0,0,0,0.1);
      background: rgba(255,255,255,0.95);
      color: #475569;
      font-size: 14px;
      line-height: 1;
      cursor: pointer;
      z-index: 3;
      display: none;
    }
    .expand-btn:hover { background: #fff; color: #111827; }
    body.compact-mode .expand-btn { display: inline-flex; align-items: center; justify-content: center; }
    .attach-btn:hover { background: #fff; color: var(--text); }
    .attachments-bar {
      display: none;
      padding: 0 16px 8px;
      gap: 8px;
      flex-wrap: wrap;
      background: transparent;
      position: absolute;
      left: 16px;
      right: 16px;
      bottom: 96px;
      z-index: 18;
    }
    .attachments-bar.visible { display: flex; }
    .att-chip {
      display: inline-flex; align-items: center; gap: 6px;
      border: 1px solid var(--border); background: var(--panel-elev-2);
      border-radius: 10px; padding: 4px 8px; font-size: 11px; color: var(--text);
    }
    .att-chip-name { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; max-width: 200px; }
    .att-chip-remove { border: none; background: transparent; color: var(--text-secondary); cursor: pointer; font-size: 12px; }
    .msg-attachments { margin-top: 8px; display: flex; flex-direction: column; gap: 6px; }
    .msg-attachment {
      border: 1px solid var(--border); background: rgba(255,255,255,0.05);
      border-radius: 10px; padding: 6px 8px; font-size: 12px; color: var(--text);
    }
    .msg-attachment img { max-width: 220px; max-height: 160px; border-radius: 8px; display: block; margin-top: 6px; }

    .input-area textarea {
      width: 100%;
      padding: 10px 98px 10px 14px;
      border: 1px solid var(--border);
      border-radius: 14px; font-size: 14px; font-family: inherit;
      outline: none; background: var(--panel-elev-2); color: var(--text);
      resize: none; min-height: 100px; max-height: 140px; line-height: 1.5;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    .input-area textarea:focus { border-color: #6f8fff; background: #fff; box-shadow: 0 0 0 2px rgba(91,124,250,0.2); }
    .input-area textarea::placeholder { color: var(--text-dim); }

    .send-btn {
      position: absolute;
      right: 18px;
      bottom: 22px;
      width: 34px;
      height: 34px;
      padding: 0;
      background: transparent;
      border: 0;
      border-radius: 8px;
      font-size: 0;
      cursor: pointer;
      transition: transform 0.08s;
      z-index: 2;
    }
    .send-btn::before {
      content: '';
      display: block;
      width: 100%;
      height: 100%;
      background-image: url("sprites/ui/quickchat-send.png");
      background-repeat: no-repeat;
      background-position: center;
      background-size: contain;
    }
    .send-btn:hover { transform: translateY(-1px); }
    .send-btn:active { transform: scale(0.96); }
    .send-btn:disabled { opacity: 1; cursor: not-allowed; transform: none; }
    .send-btn:disabled::before {
      background-image: url("sprites/ui/quickchat-send-disabled.png");
    }

    /* compact 样式兜底（放在后面，防止被默认样式覆盖） */
    body.compact-mode .input-area {
      left: 14px !important;
      right: 14px !important;
      top: 50% !important;
      bottom: auto !important;
      transform: translateY(-50%) !important;
      padding: 0 !important;
      border: 0 !important;
      background: transparent !important;
      box-shadow: none !important;
      backdrop-filter: none !important;
      -webkit-backdrop-filter: none !important;
    }
    body.compact-mode .input-area textarea {
      min-height: 76px !important;
      max-height: 76px !important;
      padding-right: 130px !important;
    }
    body.compact-mode .send-btn {
      right: 14px !important;
      bottom: 21px !important;
    }
    body.compact-mode .attach-btn {
      right: 54px !important;
      bottom: 21px !important;
    }
    body.compact-mode .expand-btn {
      right: 94px !important;
      top: 50% !important;
      transform: translateY(-50%) !important;
      width: 34px !important;
      height: 34px !important;
    }

    .shortcut-hint { display: none !important; }
    kbd {
      background: #f3f5f9; border: 1px solid #e3e8f1; border-radius: 4px;
      padding: 1px 5px; font-size: 10px; font-family: inherit; color: var(--text-secondary);
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="titlebar">
      <span class="titlebar-title"><img src="sprites/qc-icon.png" style="width:22px;height:22px;vertical-align:middle;margin-right:4px;border-radius:6px;"> 对话<span class="titlebar-subtitle">Cmd+I 迷你输入 / Cmd+U 完整对话</span></span>
      <button class="titlebar-btn" id="btn-clear" title="清空对话">🗑</button>
    </div>

    <div class="messages" id="messages">
      <div class="welcome" id="welcome">
        <div class="welcome-emoji">🐧</div>
        <div class="welcome-text">跟企鹅聊聊天吧</div>
        <div class="welcome-hint">输入消息，按 Enter 发送</div>
      </div>
    </div>

    <button id="new-msg-btn">↓ 新消息</button>
    <div class="attachments-bar" id="attachments-bar"></div>

    <div class="input-area">
      <button class="expand-btn" id="expand-btn" title="展开完整对话">⤢</button>
      <button class="attach-btn" id="attach-btn" title="添加本地附件">📎</button>
      <textarea id="input" placeholder="跟企鹅说点什么..." rows="1" autofocus></textarea>
      <button class="send-btn" id="send">发送</button>
    </div>
    <div class="shortcut-hint"><kbd>Enter</kbd> 发送 · <kbd>Shift+Enter</kbd> 换行 · <kbd>Cmd/Ctrl+V</kbd> 粘贴图片 · <kbd>Esc</kbd> 关闭</div>
  </div>

  <script>
    // ═══════════════════════════════════════════
    //  Markdown 渲染引擎
    // ═══════════════════════════════════════════

    // 配置 marked
    const markedRenderer = new marked.Renderer();
    // 兼容旧版 marked：renderer.code 接收 (text, lang, escaped) 三参数
    markedRenderer.code = function(text, lang, escaped) {
      // 新版 marked (v5+) 可能传对象，做兼容处理
      if (text && typeof text === 'object') { lang = text.lang; text = text.text; }
      const language = (lang || '').trim().toLowerCase();
      let highlighted;
      try {
        if (language && hljs.getLanguage(language)) {
          highlighted = hljs.highlight(text, { language }).value;
        } else {
          highlighted = hljs.highlightAuto(text).value;
        }
      } catch { highlighted = escapeHtml(text); }
      const langLabel = language || 'code';
      return `<div class="code-block-wrap"><div class="code-block-header"><span>${escapeHtml(langLabel)}</span><button class="code-copy-btn" onclick="copyCode(this)">复制</button></div><pre><code class="hljs">${highlighted}</code></pre></div>`;
    };
    markedRenderer.html = function(text) {
      // 兼容旧版（string）和新版（对象）
      if (text && typeof text === 'object') text = text.text || '';
      return escapeHtml(text);
    };

    marked.setOptions({ gfm: true, breaks: true, renderer: markedRenderer });

    // DOMPurify 配置
    const PURIFY_CONFIG = {
      ALLOWED_TAGS: ['a','b','blockquote','br','code','del','div','em','h1','h2','h3','h4','hr','i','li','ol','p','pre','span','strong','table','tbody','td','th','thead','tr','ul','img','button'],
      ALLOWED_ATTR: ['class','href','rel','target','title','start','src','alt','onclick','style'],
      ADD_DATA_URI_TAGS: ['img'],
      ALLOWED_URI_REGEXP: /^(?:(?:https?|mailto|tel|localpath):|[^a-z]|[a-z+.\-]+(?:[^a-z+.\-:]|$))/i,
    };
    DOMPurify.addHook('afterSanitizeAttributes', (node) => {
      if (node instanceof HTMLAnchorElement) {
        node.setAttribute('rel', 'noreferrer noopener');
        node.setAttribute('target', '_blank');
        // 拦截链接点击，用系统浏览器打开
        node.addEventListener('click', (e) => {
          e.preventDefault();
          const href = node.getAttribute('href');
          if (!href) return;
          if (href.startsWith('localpath://')) {
            const encoded = href.slice('localpath://'.length);
            let localPath = '';
            try { localPath = decodeURI(encoded || ''); } catch {}
            if (!localPath) {
              try { localPath = decodeURIComponent(encoded || ''); } catch {}
            }
            if (localPath && window.quickChatAPI?.openLocalPath) {
              window.quickChatAPI.openLocalPath(localPath);
            }
            return;
          }
          if (window.quickChatAPI?.openUrl) window.quickChatAPI.openUrl(href);
        });
      }
    });

    function renderMarkdown(text) {
      if (!text || !text.trim()) return '';
      const html = marked.parse(text);
      return DOMPurify.sanitize(html, PURIFY_CONFIG);
    }

    function escapeHtml(s) {
      return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    // 代码块复制按钮
    window.copyCode = function(btn) {
      const code = btn.closest('.code-block-wrap')?.querySelector('code');
      if (!code) return;
      const text = code.textContent;

      const showSuccess = () => {
        btn.textContent = '已复制 ✓';
        btn.classList.add('copied');
        setTimeout(() => { btn.textContent = '复制'; btn.classList.remove('copied'); }, 1500);
      };
      const showFail = () => {
        btn.textContent = '复制失败';
        setTimeout(() => { btn.textContent = '复制'; }, 1500);
      };

      if (navigator.clipboard && navigator.clipboard.writeText) {
        navigator.clipboard.writeText(text).then(showSuccess).catch(() => {
          try {
            const ta = document.createElement('textarea');
            ta.value = text;
            ta.style.cssText = 'position:fixed;opacity:0;pointer-events:none';
            document.body.appendChild(ta);
            ta.select();
            document.execCommand('copy') ? showSuccess() : showFail();
            document.body.removeChild(ta);
          } catch { showFail(); }
        });
      } else {
        try {
          const ta = document.createElement('textarea');
          ta.value = text;
          ta.style.cssText = 'position:fixed;opacity:0;pointer-events:none';
          document.body.appendChild(ta);
          ta.select();
          document.execCommand('copy') ? showSuccess() : showFail();
          document.body.removeChild(ta);
        } catch { showFail(); }
      }
    };

    // ═══════════════════════════════════════════
    //  AI 输出处理管线
    // ═══════════════════════════════════════════

    // 清理模型原始标签
    function cleanModelOutput(text) {
      if (!text) return '';
      let c = text;
      c = c.replace(/<\|tool_calls_section_begin\|>[\s\S]*?<\|tool_calls_section_end\|>/g, '');
      c = c.replace(/<\|(?:tool_calls_section_begin|tool_calls_section_end|tool_call_begin|tool_call_end|tool_sep|im_end|im_start|endoftext|pad)\|>/g, '');
      c = c.replace(/<tool_call>[\s\S]*?<\/tool_call>/g, '');
      c = c.replace(/\{"(?:name|function|tool_calls)":\s*"[^"]*",\s*"arguments":\s*(?:\{[^}]*\}|"[^"]*")\s*\}/g, '');
      c = c.replace(/#soul-update:.*$/m, '');
      c = c.replace(/\n{3,}/g, '\n\n');
      return c.trim();
    }

    // 流式阶段文本清理：移除完整 <think> 块 + 未闭合的 <think> 开头部分
    function cleanStreamingText(text) {
      if (!text) return '';
      let c = cleanModelOutput(text);
      // 移除完整 <think>...</think> 块
      c = c.replace(/<\s*think(?:ing)?\s*>[\s\S]*?<\s*\/\s*think(?:ing)?\s*>/gi, '');
      // 移除未闭合的 <think> 开头（流式中间态）
      c = c.replace(/<\s*think(?:ing)?\s*>[\s\S]*$/gi, '');
      return c.trim();
    }

    // 提取 <think> 内容
    function extractThinking(text) {
      if (!text) return { thinking: null, cleaned: text };
      const thinkMatches = [];
      const re = /<\s*think(?:ing)?\s*>([\s\S]*?)<\s*\/\s*think(?:ing)?\s*>/gi;
      let m;
      while ((m = re.exec(text)) !== null) {
        if (m[1]?.trim()) thinkMatches.push(m[1].trim());
      }
      const cleaned = text.replace(/<\s*think(?:ing)?\s*>[\s\S]*?<\s*\/\s*think(?:ing)?\s*>/gi, '').trim();
      return {
        thinking: thinkMatches.length > 0 ? thinkMatches.join('\n\n') : null,
        cleaned,
      };
    }

    // 完整处理 AI 输出
    function processAIOutput(rawText) {
      if (!rawText) return { html: '', thinking: null };
      // 过滤 NO_REPLY
      if (rawText.trim() === 'NO_REPLY') return { html: '', thinking: null, noReply: true };

      let text = cleanModelOutput(rawText);
      const { thinking, cleaned } = extractThinking(text);
      const mdHtml = renderMarkdown(cleaned);
      return { html: mdHtml, thinking };
    }

    // ═══════════════════════════════════════════
    //  DOM 操作
    // ═══════════════════════════════════════════

    const messagesEl = document.getElementById('messages');
    const welcomeEl = document.getElementById('welcome');
    const inputEl = document.getElementById('input');
    const sendBtn = document.getElementById('send');
    const attachBtn = document.getElementById('attach-btn');
    const expandBtn = document.getElementById('expand-btn');
    const attachmentsBar = document.getElementById('attachments-bar');
    const clearBtn = document.getElementById('btn-clear');

    let isWaiting = false;
    let thinkingEl = null;
    let pendingAttachments = [];
    let imeComposing = false;
    let currentQuickChatMode = 'full';
    let holdVoiceActive = false;
    let holdVoiceStarting = false;
    let holdVoiceAvailable = false;

    function updateSendButtonState() {
      const hasText = !!inputEl.value.trim();
      const hasAttachments = pendingAttachments.length > 0;
      sendBtn.disabled = isWaiting || (!hasText && !hasAttachments);
    }
    function getInputMaxHeight() {
      return document.body.classList.contains('compact-mode') ? 92 : 120;
    }
    function resizeInputByContent() {
      inputEl.style.height = 'auto';
      const min = document.body.classList.contains('compact-mode') ? 72 : 100;
      const target = Math.min(Math.max(inputEl.scrollHeight, min), getInputMaxHeight());
      inputEl.style.height = target + 'px';
    }

    function isEditableTarget(el) {
      if (!el) return false;
      if (el === inputEl) return true;
      if (el.isContentEditable) return true;
      const tag = String(el.tagName || '').toLowerCase();
      if (tag === 'textarea') return !el.disabled && !el.readOnly;
      if (tag !== 'input') return false;
      const t = String(el.type || 'text').toLowerCase();
      return ['text', 'search', 'url', 'tel', 'password', 'email', 'number'].includes(t) && !el.disabled && !el.readOnly;
    }

    function insertTextAtCaret(target, text) {
      if (!target || !text) return;
      if (target.isContentEditable) {
        target.focus();
        try { document.execCommand('insertText', false, text); } catch { target.textContent = (target.textContent || '') + text; }
        target.dispatchEvent(new Event('input', { bubbles: true }));
        return;
      }
      const val = typeof target.value === 'string' ? target.value : '';
      const start = Number.isInteger(target.selectionStart) ? target.selectionStart : val.length;
      const end = Number.isInteger(target.selectionEnd) ? target.selectionEnd : val.length;
      target.value = `${val.slice(0, start)}${text}${val.slice(end)}`;
      const pos = start + text.length;
      if (typeof target.setSelectionRange === 'function') target.setSelectionRange(pos, pos);
      target.dispatchEvent(new Event('input', { bubbles: true }));
    }

    async function initHoldVoiceAvailability() {
      if (!window.quickChatAPI?.asrCheck) return;
      try {
        const r = await window.quickChatAPI.asrCheck();
        holdVoiceAvailable = !!r?.available;
      } catch {
        holdVoiceAvailable = false;
      }
    }

    inputEl.addEventListener('input', () => {
      resizeInputByContent();
      updateSendButtonState();
    });
    inputEl.addEventListener('keyup', updateSendButtonState);
    inputEl.addEventListener('change', updateSendButtonState);
    inputEl.addEventListener('compositionstart', () => { imeComposing = true; });
    inputEl.addEventListener('compositionend', () => { imeComposing = false; });

    function createAvatarEl(role) {
      const avatar = document.createElement('div');
      avatar.className = 'msg-avatar';
      if (role === 'ai') {
        const img = document.createElement('img');
        img.src = 'sprites/qc-icon.png';
        img.alt = '🐧';
        avatar.appendChild(img);
      } else {
        avatar.textContent = '👤';
      }
      return avatar;
    }

    function createCopyBtn(getText) {
      const btn = document.createElement('button');
      btn.className = 'msg-copy-btn';
      btn.title = '复制';
      btn.textContent = '⎘';
      btn.addEventListener('click', (e) => {
        e.stopPropagation();
        const text = getText();
        if (!text) return;

        const showSuccess = () => {
          btn.textContent = '✓';
          btn.classList.add('copied');
          setTimeout(() => { btn.textContent = '⎘'; btn.classList.remove('copied'); }, 1500);
        };
        const showFail = () => {
          btn.textContent = '✗';
          setTimeout(() => { btn.textContent = '⎘'; }, 1500);
        };

        // 优先用 clipboard API，失败时用 execCommand 兜底
        if (navigator.clipboard && navigator.clipboard.writeText) {
          navigator.clipboard.writeText(text).then(showSuccess).catch(() => {
            // execCommand 兜底
            try {
              const ta = document.createElement('textarea');
              ta.value = text;
              ta.style.cssText = 'position:fixed;opacity:0;pointer-events:none';
              document.body.appendChild(ta);
              ta.select();
              const ok = document.execCommand('copy');
              document.body.removeChild(ta);
              ok ? showSuccess() : showFail();
            } catch { showFail(); }
          });
        } else {
          try {
            const ta = document.createElement('textarea');
            ta.value = text;
            ta.style.cssText = 'position:fixed;opacity:0;pointer-events:none';
            document.body.appendChild(ta);
            ta.select();
            const ok = document.execCommand('copy');
            document.body.removeChild(ta);
            ok ? showSuccess() : showFail();
          } catch { showFail(); }
        }
      });
      return btn;
    }

    function createThinkBlock(thinkContent) {
      const block = document.createElement('div');
      block.className = 'think-block';
      const header = document.createElement('button');
      header.className = 'think-header';
      header.innerHTML = '<span class="think-arrow">▸</span> <span>🧠 思考过程</span>';
      header.addEventListener('click', () => block.classList.toggle('open'));
      const content = document.createElement('div');
      content.className = 'think-content md-content';
      content.innerHTML = renderMarkdown(thinkContent);
      block.appendChild(header);
      block.appendChild(content);
      return block;
    }

    function createToolCard(name, detail, output) {
      const card = document.createElement('div');
      card.className = 'tool-card' + (output ? ' expandable' : '');
      const header = document.createElement('div');
      header.className = 'tool-card-header';
      const title = document.createElement('div');
      title.className = 'tool-card-title';
      title.innerHTML = `<span class="tool-card-icon">⚙</span> <span>${escapeHtml(name)}</span>`;
      const status = document.createElement('span');
      status.className = 'tool-card-status';
      status.textContent = '✓';
      header.appendChild(title);
      header.appendChild(status);
      card.appendChild(header);
      if (detail) {
        const detailEl = document.createElement('div');
        detailEl.className = 'tool-card-detail';
        detailEl.textContent = detail.length > 120 ? detail.slice(0, 120) + '…' : detail;
        card.appendChild(detailEl);
      }
      if (output) {
        const outputEl = document.createElement('div');
        outputEl.className = 'tool-card-output';
        outputEl.textContent = output.length > 400 ? output.slice(0, 400) + '…' : output;
        card.appendChild(outputEl);
        card.addEventListener('click', () => card.classList.toggle('expanded'));
      }
      return card;
    }

    function createAgentStatus(text) {
      const el = document.createElement('div');
      el.className = 'agent-status';
      el.innerHTML = `<div class="agent-status-spinner"></div> <span>${escapeHtml(text)}</span>`;
      return el;
    }

    // ─── 追加消息 ───
    function appendMessage(role, text, attachments = []) {
      const msg = document.createElement('div');
      msg.className = `msg ${role}`;
      msg.appendChild(createAvatarEl(role));

      const bubble = document.createElement('div');
      bubble.className = 'msg-bubble';

      if (role === 'ai') {
        renderAIBubble(bubble, text);
      } else {
        bubble.textContent = text;
      }

      // 附件
      if (attachments.length > 0) {
        const attWrap = document.createElement('div');
        attWrap.className = 'msg-attachments';
        attachments.forEach((att) => {
          const row = document.createElement('div');
          row.className = 'msg-attachment';
          row.textContent = `${att.type === 'image' ? '🖼️' : '📄'} ${att.name || '未命名附件'}`;
          if (att.type === 'image' && att.dataUrl) {
            const img = document.createElement('img');
            img.src = att.dataUrl;
            row.appendChild(img);
          }
          attWrap.appendChild(row);
        });
        bubble.appendChild(attWrap);
      }

      msg.appendChild(bubble);
      messagesEl.appendChild(msg);
      scrollToBottom();
    }

    // AI 气泡渲染（完整管线）
    let lastRawText = '';  // 仅用于外部引用，复制按钮用局部闭包
    function renderAIBubble(bubble, rawText) {
      lastRawText = rawText;
      const capturedText = rawText;  // 局部闭包，每条消息独立
      const result = processAIOutput(rawText);
      if (result.noReply) return;

      // Think 折叠
      if (result.thinking) {
        bubble.appendChild(createThinkBlock(result.thinking));
      }

      // Markdown 正文
      if (result.html) {
        const mdDiv = document.createElement('div');
        mdDiv.className = 'md-content';
        mdDiv.innerHTML = result.html;
        bubble.appendChild(mdDiv);
      }

      // 复制按钮（用局部闭包，不共享 lastRawText）
      bubble.appendChild(createCopyBtn(() => capturedText));
    }

    // ─── 发送消息 ───
    function doSend() {
      const text = inputEl.value.trim();
      if ((!text && pendingAttachments.length === 0) || isWaiting) return false;
      if (welcomeEl) welcomeEl.style.display = 'none';
      appendMessage('user', text || '[发送了附件]', pendingAttachments);
      inputEl.value = '';
      inputEl.style.height = 'auto';
      pendingAttachments = [];
      renderAttachmentsBar();
      showThinkingAnim();
      isWaiting = true;
      updateSendButtonState();
      activeRequestStartedAt = Date.now();
      activeRequestText = text || '[附件消息]';
      activeRunId = '';
      showProcessTip('已收到，正在思考...');
      startProcessTicker();

      // 通知主窗口宠物进入 thinking 状态（气泡同步）
      if (window.quickChatAPI?.notifyPetThinking) {
        window.quickChatAPI.notifyPetThinking();
      }

      // 优先走 Gateway RPC chat.send（完整 Agent loop）
      if (window.quickChatAPI.gatewayChatSend) {
        window.quickChatAPI.gatewayChatSend(activeRequestText)
          .then((result) => {
            if (result && result.success) {
              activeRunId = result.result?.runId || '';
              showProcessTip('正在规划执行步骤...');
            } else {
              console.warn('[quick-chat] RPC 失败，回退旧路径:', result && result.error);
              showProcessTip('连接不稳定，正在自动重试...');
              window.quickChatAPI.sendMessage(activeRequestText, []);
            }
          })
          .catch((err) => {
            console.warn('[quick-chat] RPC 异常，回退旧路径:', err);
            showProcessTip('连接不稳定，正在自动重试...');
            window.quickChatAPI.sendMessage(activeRequestText, []);
          });
      } else {
        // 旧路径：通过主窗口中转
        showProcessTip('正在处理中...');
        window.quickChatAPI.sendMessage(activeRequestText, []);
      }
      return true;
    }

    // ─── 思考动画 ───
    function showThinkingAnim() {
      const msg = document.createElement('div');
      msg.className = 'msg ai';
      msg.id = 'thinking-msg';
      msg.appendChild(createAvatarEl('ai'));
      const bubble = document.createElement('div');
      bubble.className = 'msg-bubble thinking';
      bubble.innerHTML = '<span class="thinking-dots">思考中</span>';
      msg.appendChild(bubble);
      messagesEl.appendChild(msg);
      thinkingEl = msg;
      scrollToBottom();
    }

    function hideThinkingAnim() {
      if (thinkingEl) { thinkingEl.remove(); thinkingEl = null; }
    }

    // ─── 过程提示（非气泡） ───
    let processTipEl = null;
    let processTicker = null;
    let processElapsed = 0;

    function showProcessTip(text) {
      const value = String(text || '').trim();
      if (!value) return;
      if (!processTipEl) {
        processTipEl = document.createElement('div');
        processTipEl.className = 'process-tip';
        messagesEl.appendChild(processTipEl);
      }
      processTipEl.textContent = value;
      scrollToBottom();
    }

    function clearProcessTip() {
      if (processTipEl) {
        processTipEl.remove();
        processTipEl = null;
      }
      if (processTicker) {
        clearInterval(processTicker);
        processTicker = null;
      }
      processElapsed = 0;
    }

    function startProcessTicker() {
      if (processTicker) clearInterval(processTicker);
      processElapsed = 0;
      processTicker = setInterval(() => {
        if (!isWaiting) return;
        processElapsed += 5;
        if (processElapsed >= 10) {
          showProcessTip(`正在处理中（${processElapsed}s），请稍候...`);
        }
      }, 5000);
    }

    // ─── 当前请求状态 ───
    let activeRequestStartedAt = 0;
    let activeRequestText = '';
    let activeRunId = '';
    let lastAssistantFingerprint = '';

    // ═══════════════════════════════════════════
    //  方案 A+B：50ms 节流 + 字符批量追加 + smooth 滚动
    // ═══════════════════════════════════════════

    // ─── 流式输出状态 ───
    let streamingMsgEl = null;
    let streamingBubbleEl = null;
    let streamingTextEl = null;
    let streamingRawText = '';
    let streamingRafId = null;    // RAF 节流 id
    let pendingStreamText = '';   // 待刷新的文本
    let streamFlushTimer = null;  // 50ms 节流 timer

    // 清理流式状态
    function clearStreamingState() {
      if (streamingRafId) { cancelAnimationFrame(streamingRafId); streamingRafId = null; }
      if (streamFlushTimer) { clearTimeout(streamFlushTimer); streamFlushTimer = null; }
      streamingMsgEl = null;
      streamingBubbleEl = null;
      streamingTextEl = null;
      streamingRawText = '';
      pendingStreamText = '';
    }

    // 刷新纯文本到 DOM（50ms 节流后执行）
    function flushStreamText() {
      streamFlushTimer = null;
      streamingRafId = null;
      if (!streamingTextEl) return;
      const display = cleanStreamingText(pendingStreamText);
      streamingTextEl.textContent = display;
      // 流式阶段使用即时滚动，避免 smooth 连续触发导致抖动
      scrollToBottom(false, 'auto');
    }

    // 创建流式气泡 DOM
    function createStreamingBubble() {
      const msg = document.createElement('div');
      msg.className = 'msg ai';
      msg.appendChild(createAvatarEl('ai'));
      const bubble = document.createElement('div');
      bubble.className = 'msg-bubble streaming-bubble';
      const textEl = document.createElement('div');
      textEl.className = 'streaming-text';
      bubble.appendChild(textEl);
      const cursor = document.createElement('span');
      cursor.className = 'streaming-cursor';
      bubble.appendChild(cursor);
      msg.appendChild(bubble);
      messagesEl.appendChild(msg);
      streamingMsgEl = msg;
      streamingBubbleEl = bubble;
      streamingTextEl = textEl;
    }

    if (window.quickChatAPI?.onAIStreamChunk) {
      window.quickChatAPI.onAIStreamChunk((text) => {
        if (!text || !text.trim()) return;
        if (thinkingEl) hideThinkingAnim();
        clearProcessTip();
        streamingRawText = text;
        pendingStreamText = text;

        if (!streamingMsgEl) {
          createStreamingBubble();
          scrollToBottom(true);
        }

        // 50ms 节流：积攒字符后一次性刷新
        if (!streamFlushTimer) {
          streamFlushTimer = setTimeout(() => {
            requestAnimationFrame(flushStreamText);
          }, 50);
        }
      });
    }

    // ─── 接收 AI 最终回复 ───
    if (window.quickChatAPI?.onAIReply) {
      window.quickChatAPI.onAIReply((text) => {
        hideThinkingAnim();
        clearProcessTip();

        if (text?.trim() === 'NO_REPLY') {
          if (streamingMsgEl) streamingMsgEl.remove();
          clearStreamingState();
          isWaiting = false;
          updateSendButtonState();
          return;
        }

        if (streamingMsgEl && streamingBubbleEl) {
          streamingBubbleEl.innerHTML = '';
          streamingBubbleEl.classList.remove('streaming-bubble');
          streamingBubbleEl.classList.add('md-fade-in');
          renderAIBubble(streamingBubbleEl, text);
          scrollToBottom(false, 'auto');
          clearStreamingState();
        } else {
          appendMessage('ai', text);
          clearStreamingState();
        }

        isWaiting = false;
        updateSendButtonState();
        inputEl.focus();
      });
    }

    // ─── 接收来自主窗口的用户消息 ───
    if (window.quickChatAPI?.onUserMsg) {
      window.quickChatAPI.onUserMsg((text) => {
        const content = String(text || '').trim();
        if (!content) return;

        if (welcomeEl) welcomeEl.style.display = 'none';

        // 新用户消息到达时先清理上轮残留，避免“吞气泡/串气泡”
        hideThinkingAnim();
        clearProcessTip();
        clearStreamingState();

        appendMessage('user', content);
        showThinkingAnim();

        isWaiting = true;
        sendBtn.disabled = true;
        activeRequestStartedAt = Date.now();
        activeRequestText = content;
        activeRunId = '';
        showProcessTip('已收到，正在思考...');
      });
    }

    // ─── Agent 工具进度（通过 IPC 接收） ───
    const TOOL_ICONS = {
      read: '📖', write: '💾', edit: '✏️', apply_patch: '🩹',
      exec: '▶️', process: '⚙', grep: '🔍', find: '🔎', ls: '📁',
      cron: '⏰', message: '💬', canvas: '🎨', image: '🖼️', pdf: '📄',
      memory_search: '🧠', memory_get: '🧠',
      web_search: '🌐', fetch_page: '🌐', web_screenshot: '📸',
      text_to_speech: '🔊', think: '💭',
      session_status: '📊', sessions_list: '📋', sessions_send: '📤',
      sessions_spawn: '🔀', agents_list: '🤖', subagents: '🤖',
      gateway: '🔧', nodes: '📡',
    };
    const TOOL_LABELS = {
      read: '读取文件', write: '写入文件', edit: '编辑文件', apply_patch: '应用补丁',
      exec: '执行命令', process: '管理进程', grep: '搜索内容', find: '查找文件', ls: '列出目录',
      cron: '定时任务', message: '发送消息', canvas: '画布操作', image: '图片分析', pdf: 'PDF 处理',
      memory_search: '搜索记忆', memory_get: '获取记忆',
      web_search: '搜索网页', fetch_page: '抓取网页', web_screenshot: '网页截图',
      text_to_speech: '语音合成', think: '思考中',
      session_status: '会话状态', sessions_list: '会话列表', sessions_send: '发送消息',
      sessions_spawn: '创建子会话', agents_list: 'Agent 列表', subagents: '子 Agent',
      gateway: '网关管理', nodes: '设备控制',
    };

    // 活跃的工具卡片（按 toolCallId 或 name 索引）
    const activeToolCards = new Map();

    // ─── 旧路径：Agent 工具进度（通过主窗口中转） ───
    if (window.quickChatAPI?.onToolProgress) {
      window.quickChatAPI.onToolProgress((evt) => {
        handleToolEvent(evt);
      });
    }

    // ─── Gateway RPC 事件：chat（流式文本） ───
    if (window.quickChatAPI?.onGatewayChatEvent) {
      window.quickChatAPI.onGatewayChatEvent((payload) => {
        if (!payload) return;

        const payloadRunId = payload.runId || '';

        // 锁定 runId：第一个到来的 delta/final 决定本轮 runId
        // 后续不同 runId 一律忽略（过滤 sub-run / 后台任务产生的额外 final）
        if (payloadRunId) {
          if (!activeRunId) {
            // 第一个事件，锁定本轮 runId
            if (payload.state === 'delta' || payload.state === 'final') {
              activeRunId = payloadRunId;
            }
          } else if (payloadRunId !== activeRunId) {
            // 不同 runId，忽略
            return;
          }
        }

        // 如果既没在等待、也没有流式气泡在显示，则忽略
        if (!isWaiting && !streamingMsgEl && !streamingRawText) {
          return;
        }

        if (payload.state === 'delta') {
          const text = extractGatewayText(payload.message);
          if (text !== null && text.trim()) {
            hideThinkingAnim();
            clearProcessTip();
            streamingRawText = text;
            pendingStreamText = text;

            if (!streamingMsgEl) {
              createStreamingBubble();
              scrollToBottom(true);
            }

            // 50ms 节流刷新
            if (!streamFlushTimer) {
              streamFlushTimer = setTimeout(() => {
                requestAnimationFrame(flushStreamText);
              }, 50);
            }
          }
          return;
        }

        if (payload.state === 'final') {
          void handleGatewayFinalEvent(payload);
          return;
        }

        if (payload.state === 'aborted') {
          void handleGatewayAbortOrError('aborted');
          return;
        }

        if (payload.state === 'error') {
          void handleGatewayAbortOrError('error', payload.errorMessage);
          return;
        }
      });
    }

    // ─── Gateway RPC 事件：agent（工具调用进度） ───
    if (window.quickChatAPI?.onGatewayAgentEvent) {
      window.quickChatAPI.onGatewayAgentEvent((payload) => {
        if (!payload) return;
        if (!isWaiting) return;
        const payloadRunId = payload.runId || payload.data?.runId || '';
        if (activeRunId && payloadRunId && payloadRunId !== activeRunId) return;

        const stream = payload.stream;
        const data = payload.data || {};

        if (stream === 'tool') {
          if (data.phase === 'start') {
            handleToolEvent({ type: 'tool_start', phase: 'start', name: data.name || 'tool', toolCallId: data.toolCallId || '', args: data.args });
          } else if (data.phase === 'update') {
            handleToolEvent({ type: 'tool_update', name: data.name || 'tool', toolCallId: data.toolCallId || '', output: data.partialResult });
          } else if (data.phase === 'result') {
            handleToolEvent({ type: 'tool_end', phase: 'result', name: data.name || 'tool', toolCallId: data.toolCallId || '', output: data.result });
          }
        } else if (stream === 'lifecycle') {
          if (data.phase === 'start') {
            showProcessTip('正在规划执行步骤...');
          } else if (data.phase === 'end') {
            showProcessTip('执行完成，正在整理回复...');
            activeToolCards.forEach((card) => { if (!card.dataset.done) markToolCardDone(card); });
            activeToolCards.clear();
          }
        } else if (stream === 'assistant') {
          showProcessTip('正在组织回复内容...');
        }
      });
    }

    // ─── 统一工具事件处理 ───
    function handleToolEvent(evt) {
      if (!evt) return;

      if (evt.type === 'tool_start' || evt.phase === 'start') {
        if (thinkingEl) hideThinkingAnim();
        // 定型当前流式气泡（清空引用，后续 delta 会创建新气泡）
        if (streamingMsgEl) {
          streamingMsgEl = null;
          streamingBubbleEl = null;
          streamingTextEl = null;
          streamingRawText = '';
        }
        const name = evt.name || 'tool';
        const icon = TOOL_ICONS[name] || '🔧';
        const label = TOOL_LABELS[name] || name;
        const detail = extractToolArgDetail(evt.args);
        showProcessTip(`正在${label}...`);
        const card = createLiveToolCard(icon, label, name, detail);
        const key = evt.toolCallId || `${name}-${Date.now()}`;
        card.dataset.cardKey = key;
        activeToolCards.set(key, card);
        messagesEl.appendChild(card);
        scrollToBottom();
        return;
      }

      if (evt.type === 'tool_update') {
        // partialResult → 更新卡片 preview（不完成）
        const key = evt.toolCallId || '';
        const card = key ? activeToolCards.get(key) : findToolCardByName(evt.name || '');
        if (card && evt.output) {
          updateToolCardPreview(card, evt.output, false);
        }
        return;
      }

      if (evt.type === 'tool_end') {
        const key = evt.toolCallId || '';
        let card = key ? activeToolCards.get(key) : null;
        // fallback：按工具名找还没完成的卡片
        if (!card) card = findToolCardByName(evt.name || '');
        if (card) {
          if (evt.output) updateToolCardPreview(card, evt.output, true);
          markToolCardDone(card);
        }
        const label = TOOL_LABELS[evt.name || ''] || evt.name || 'tool';
        showProcessTip(`${label}已完成，继续处理中...`);
        return;
      }

      if (evt.type === 'agent_end') {
        activeToolCards.forEach((card) => { if (!card.dataset.done) markToolCardDone(card); });
        activeToolCards.clear();
      }
    }

    // 从工具参数中提取摘要 detail（优先 path/command/query/url）
    function extractToolArgDetail(args) {
      if (!args) return '';
      let obj = args;
      if (typeof args === 'string') {
        try { obj = JSON.parse(args); } catch { return args.length > 100 ? args.slice(0, 100) + '…' : args; }
      }
      if (typeof obj !== 'object' || obj === null) return '';
      const priority = ['path', 'command', 'cmd', 'query', 'q', 'url', 'to', 'key', 'sessionKey'];
      for (const k of priority) {
        if (typeof obj[k] === 'string' && obj[k].trim()) {
          const v = obj[k].trim();
          // 路径做 home 简化
          return v.replace(/\/Users\/[^/]+/g, '~').replace(/\/home\/[^/]+/g, '~').slice(0, 120);
        }
      }
      // fallback：JSON 摘要
      try {
        const s = JSON.stringify(obj);
        return s.length > 80 ? s.slice(0, 80) + '…' : s;
      } catch { return ''; }
    }

    // 按工具名找第一个未完成的 card
    function findToolCardByName(name) {
      for (const [, card] of activeToolCards) {
        if (card.dataset.toolName === name && !card.dataset.done) return card;
      }
      return null;
    }

    // 更新工具卡片 preview 区域
    function updateToolCardPreview(card, output, isFinal) {
      if (!output) return;
      const text = typeof output === 'string' ? output : JSON.stringify(output, null, 2);
      let previewEl = card.querySelector('.tool-card-output');
      if (!previewEl) {
        previewEl = document.createElement('div');
        previewEl.className = 'tool-card-output';
        card.appendChild(previewEl);
        // 点击展开/折叠
        card.classList.add('expandable');
        card.addEventListener('click', () => card.classList.toggle('expanded'));
      }
      const lines = text.split('\n').slice(0, 6).join('\n');
      const preview = lines.length > 400 ? lines.slice(0, 400) + '…' : lines;
      const hasMore = text.split('\n').length > 6 || text.length > 400;
      previewEl.textContent = hasMore ? preview + '\n…' : preview;
    }

    function extractGatewayText(message) {
      if (!message) return null;
      const content = message.content;
      if (typeof content === 'string') return content;
      if (Array.isArray(content)) {
        const parts = [];
        const thinkParts = [];
        for (const p of content) {
          if (!p) continue;
          if (p.type === 'text' && typeof p.text === 'string') {
            parts.push(p.text);
          } else if (p.type === 'thinking' && typeof p.thinking === 'string' && p.thinking.trim()) {
            // 结构化 thinking block → 包成 <think> 标签供 processAIOutput 识别
            thinkParts.push(`<think>${p.thinking.trim()}</think>`);
          }
        }
        const allParts = [...thinkParts, ...parts];
        return allParts.length > 0 ? allParts.join('\n') : null;
      }
      if (typeof message.text === 'string') return message.text;
      return null;
    }

    function getMessageTimestamp(message) {
      if (!message || typeof message !== 'object') return 0;
      const raw = message.timestamp ?? message.ts ?? message.createdAt ?? message.time;
      if (typeof raw === 'number' && Number.isFinite(raw)) return raw;
      if (typeof raw === 'string') {
        const n = Number(raw);
        if (Number.isFinite(n) && n > 0) return n;
        const d = Date.parse(raw);
        if (!Number.isNaN(d)) return d;
      }
      return 0;
    }

    function isRenderableAssistantText(text) {
      if (!text || !String(text).trim()) return false;
      const result = processAIOutput(String(text));
      if (result.noReply) return false;
      return Boolean((result.html && result.html.trim()) || (result.thinking && result.thinking.trim()));
    }

    function makeAssistantFingerprint(text, timestamp = 0) {
      const short = String(text || '').trim().slice(0, 160);
      return `${timestamp || '0'}::${short}`;
    }

    async function findAssistantReplyFromHistory(minTimestamp = 0) {
      if (!window.quickChatAPI?.gatewayChatHistory) return null;
      try {
        const res = await window.quickChatAPI.gatewayChatHistory(undefined, 120);
        const messages = Array.isArray(res?.result?.messages) ? res.result.messages : [];
        if (messages.length === 0) return null;

        for (let i = messages.length - 1; i >= 0; i--) {
          const msg = messages[i];
          if (!msg || String(msg.role || '').toLowerCase() !== 'assistant') continue;
          const text = extractGatewayText(msg);
          if (!text || !text.trim()) continue;
          if (!isRenderableAssistantText(text)) continue;

          const ts = getMessageTimestamp(msg);
          if (minTimestamp && ts && ts < minTimestamp - 3000) continue;

          const fp = makeAssistantFingerprint(text, ts);
          if (fp === lastAssistantFingerprint) continue;

          return { text, timestamp: ts, fingerprint: fp };
        }
      } catch (err) {
        console.warn('[quick-chat] chat.history fallback failed:', err);
      }
      return null;
    }

    function finishActiveRequestUI() {
      hideThinkingAnim();
      clearProcessTip();
      clearStreamingState();
      activeToolCards.forEach((card) => { if (!card.dataset.done) markToolCardDone(card); });
      activeToolCards.clear();
      isWaiting = false;
      sendBtn.disabled = false;
      inputEl.focus();
      activeRequestStartedAt = 0;
      activeRequestText = '';
      activeRunId = '';
    }

    async function handleGatewayFinalEvent(payload) {
      hideThinkingAnim();
      clearProcessTip();

      // 确保把最新 pending 文本刷入
      if (streamFlushTimer) { clearTimeout(streamFlushTimer); streamFlushTimer = null; }
      if (streamingTextEl && pendingStreamText) {
        streamingTextEl.textContent = cleanStreamingText(pendingStreamText);
      }

      const finalText = extractGatewayText(payload.message);
      const streamText = (streamingRawText || '').trim();
      const bestText = (() => {
        if (!finalText || !finalText.trim()) return streamText || null;
        if (!streamText) return finalText.trim();
        return finalText.trim().length >= streamText.length ? finalText.trim() : streamText;
      })();

      let rendered = false;

      if (bestText && isRenderableAssistantText(bestText)) {
        if (streamingMsgEl && streamingBubbleEl) {
          streamingBubbleEl.innerHTML = '';
          streamingBubbleEl.classList.remove('streaming-bubble');
          streamingBubbleEl.classList.add('md-fade-in');
          renderAIBubble(streamingBubbleEl, bestText);
          scrollToBottom();
        } else {
          appendMessage('ai', bestText);
        }
        lastAssistantFingerprint = makeAssistantFingerprint(bestText, getMessageTimestamp(payload.message));
        rendered = true;
      } else if (streamingMsgEl && streamText) {
        streamingBubbleEl.innerHTML = '';
        streamingBubbleEl.classList.remove('streaming-bubble');
        streamingBubbleEl.classList.add('md-fade-in');
        renderAIBubble(streamingBubbleEl, streamText);
        scrollToBottom();
        lastAssistantFingerprint = makeAssistantFingerprint(streamText, Date.now());
        rendered = true;
      }

      // 清空流式状态
      clearStreamingState();

      if (!rendered) {
        const fallback = await findAssistantReplyFromHistory(activeRequestStartedAt);
        if (fallback) {
          appendMessage('ai', fallback.text);
          lastAssistantFingerprint = fallback.fingerprint;
          rendered = true;
        }
      }

      if (!rendered) {
        appendMessage('ai', '✅ 已完成，我可以继续帮你下一步。');
      }

      finishActiveRequestUI();
    }

    async function handleGatewayAbortOrError(kind = 'error', errorMessage = '') {
      hideThinkingAnim();
      clearProcessTip();

      const fallback = await findAssistantReplyFromHistory(activeRequestStartedAt);
      if (fallback) {
        appendMessage('ai', fallback.text);
        lastAssistantFingerprint = fallback.fingerprint;
      } else if (kind === 'aborted') {
        appendMessage('ai', '⏹️ 已停止本次处理。');
      } else {
        // 不直接暴露技术报错，给出可执行的用户反馈
        appendMessage('ai', '我正在处理中，刚刚那次结果没完整返回。我现在继续给你执行，你再发一句就行。');
      }

      if (errorMessage) {
        console.warn('[quick-chat] gateway chat error:', errorMessage);
      }

      finishActiveRequestUI();
    }

    function createLiveToolCard(icon, label, toolName, detail) {
      const card = document.createElement('div');
      card.className = 'tool-card';
      card.dataset.toolName = toolName;
      const detailHtml = detail ? `<div class="tool-card-detail">${escapeHtml(detail)}</div>` : '';
      card.innerHTML = `
        <div class="tool-card-header">
          <div class="tool-card-title">
            <span class="tool-card-icon">${icon}</span>
            <span>${escapeHtml(label)}</span>
          </div>
          <div class="tool-card-spinner"></div>
        </div>
        ${detailHtml}
      `;
      return card;
    }

    function markToolCardDone(card) {
      card.dataset.done = '1';
      const spinner = card.querySelector('.tool-card-spinner');
      if (spinner) {
        spinner.outerHTML = '<span class="tool-card-status">✓</span>';
      }
    }

    // ─── 工具函数 ───
    const newMsgBtn = document.getElementById('new-msg-btn');
    let userScrolledUp = false;   // 用户是否在手动往上翻
    let smoothScrollRafId = null; // 防止多次同时调用 smooth scroll

    // 判断是否接近底部（阈值 120px）
    function isNearBottom() {
      return messagesEl.scrollHeight - messagesEl.scrollTop - messagesEl.clientHeight < 120;
    }

    // 监听用户手动滚动
    messagesEl.addEventListener('scroll', () => {
      if (isNearBottom()) {
        userScrolledUp = false;
        newMsgBtn.style.display = 'none';
      } else {
        userScrolledUp = true;
      }
    }, { passive: true });

    // 点击"新消息"按钮跳到底部
    newMsgBtn.addEventListener('click', () => {
      userScrolledUp = false;
      newMsgBtn.style.display = 'none';
      messagesEl.scrollTo({ top: messagesEl.scrollHeight, behavior: 'smooth' });
    });

    function scrollToBottom(force = false, behavior = 'smooth') {
      if (!force && userScrolledUp) {
        // 用户在往上翻，不强制跟随，显示新消息提示
        newMsgBtn.style.display = 'block';
        return;
      }
      if (smoothScrollRafId) return; // 已有一个 smooth 在跑，跳过
      smoothScrollRafId = requestAnimationFrame(() => {
        smoothScrollRafId = null;
        messagesEl.scrollTo({ top: messagesEl.scrollHeight, behavior });
      });
    }

    clearBtn.addEventListener('click', () => {
      messagesEl.innerHTML = '';
      const w = document.createElement('div');
      w.className = 'welcome'; w.id = 'welcome';
      w.innerHTML = '<div class="welcome-emoji">🐧</div><div class="welcome-text">跟企鹅聊聊天吧</div><div class="welcome-hint">输入消息，按 Enter 发送</div>';
      messagesEl.appendChild(w);
      isWaiting = false; sendBtn.disabled = false;
      updateSendButtonState();
      hideThinkingAnim();
      clearProcessTip();
      clearStreamingState();
      activeToolCards.clear();
      pendingAttachments = [];
      renderAttachmentsBar();
      userScrolledUp = false;
      newMsgBtn.style.display = 'none';
    });

    sendBtn.addEventListener('click', doSend);
    inputEl.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && (imeComposing || e.isComposing || e.keyCode === 229)) return;
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        const sent = doSend();
        // 仅迷你态 Enter 发送后自动关闭；完整窗口态保持打开
        if (sent && currentQuickChatMode === 'compact') {
          window.quickChatAPI?.hide?.();
        }
      }
      if (e.key === 'Escape') window.quickChatAPI.closeWindow();
    });

    // 按住 Cmd/Ctrl 进行语音输入（仅在可编辑输入场景）
    const isMac = /Mac|iPhone|iPad|iPod/.test(navigator.platform || '');
    document.addEventListener('keydown', async (e) => {
      const holdKey = isMac ? e.key === 'Meta' : e.key === 'Control';
      if (!holdKey || e.repeat || holdVoiceActive || holdVoiceStarting) return;
      if (!holdVoiceAvailable || !window.quickChatAPI?.asrStart) return;
      const active = document.activeElement;
      if (!isEditableTarget(active)) return;
      holdVoiceStarting = true;
      try {
        const rs = await window.quickChatAPI.asrStart();
        if (rs && !rs.error) {
          holdVoiceActive = true;
        }
      } catch {}
      holdVoiceStarting = false;
    }, true);

    document.addEventListener('keyup', async (e) => {
      const holdKey = isMac ? e.key === 'Meta' : e.key === 'Control';
      if (!holdKey || !holdVoiceActive || !window.quickChatAPI?.asrStop) return;
      holdVoiceActive = false;
      try {
        const r = await window.quickChatAPI.asrStop({});
        const text = String(r?.text || '').trim();
        if (text) insertTextAtCaret(document.activeElement || inputEl, text);
      } catch {}
    }, true);

    attachBtn.addEventListener('click', async () => {
      if (!window.quickChatAPI?.pickFiles) return;
      const result = await window.quickChatAPI.pickFiles();
      if (!result?.ok || !result.files) return;
      result.files.forEach(addAttachment);
      renderAttachmentsBar();
    });
    expandBtn.addEventListener('click', () => {
      window.quickChatAPI?.expandWindow?.();
    });


    inputEl.addEventListener('paste', async (e) => {
      const items = e.clipboardData?.items ? Array.from(e.clipboardData.items) : [];
      if (!items.some(it => it.type?.startsWith('image/'))) return;
      e.preventDefault();
      if (!window.quickChatAPI?.readClipboardImage) return;
      const res = await window.quickChatAPI.readClipboardImage();
      if (res?.ok && res.image) { addAttachment(res.image); renderAttachmentsBar(); }
    });

    function addAttachment(att) {
      if (!att?.name) return;
      if (!pendingAttachments.some(a => a.name === att.name && a.path === att.path)) pendingAttachments.push(att);
    }

    function renderAttachmentsBar() {
      attachmentsBar.innerHTML = '';
      if (pendingAttachments.length === 0) { attachmentsBar.classList.remove('visible'); return; }
      pendingAttachments.forEach((att, idx) => {
        const chip = document.createElement('div');
        chip.className = 'att-chip';
        chip.innerHTML = `<span>${att.type === 'image' ? '🖼️' : '📄'}</span><span class="att-chip-name" title="${att.path || ''}">${att.name}</span>`;
        const rm = document.createElement('button');
        rm.className = 'att-chip-remove'; rm.title = '移除'; rm.textContent = '×';
        rm.addEventListener('click', () => { pendingAttachments.splice(idx, 1); renderAttachmentsBar(); });
        chip.appendChild(rm);
        attachmentsBar.appendChild(chip);
      });
      attachmentsBar.classList.add('visible');
      updateSendButtonState();
    }

    window.addEventListener('focus', () => { setTimeout(() => inputEl.focus(), 50); });
    initHoldVoiceAvailability();
    setTimeout(() => { resizeInputByContent(); updateSendButtonState(); }, 0);

    if (window.quickChatAPI?.onModeChange) {
      window.quickChatAPI.onModeChange((mode) => {
        currentQuickChatMode = mode === 'compact' ? 'compact' : 'full';
        document.body.classList.toggle('compact-mode', mode === 'compact');
        resizeInputByContent();
        updateSendButtonState();
      });
    }

    // ─── 打开时从 Gateway 加载聊天历史 ───
    async function loadChatHistory() {
      if (!window.quickChatAPI?.gatewayChatHistory) return; // 没有 RPC
      try {
        const res = await window.quickChatAPI.gatewayChatHistory();
        if (!res?.success || !res.result?.messages) return;
        const messages = res.result.messages;
        if (messages.length === 0) return;

        // 隐藏欢迎页
        if (welcomeEl) welcomeEl.style.display = 'none';

        // 渲染历史消息
        let latestAssistantText = '';
        let latestAssistantTs = 0;
        for (const msg of messages) {
          const role = (msg.role || '').toLowerCase();
          // 跳过 system / tool 相关角色
          if (role === 'system' || role === 'tool' || role === 'toolresult' || role === 'tool_result') continue;
          if (role === 'user') {
            const text = extractGatewayText(msg);
            if (text && text.trim()) {
              appendMessage('user', text);
            }
          } else if (role === 'assistant') {
            const text = extractGatewayText(msg);
            // 跳过没有可渲染文本的助手消息（如只有 toolcall 的消息）
            if (text && text.trim() && isRenderableAssistantText(text)) {
              appendMessage('ai', text);
              latestAssistantText = text;
              latestAssistantTs = getMessageTimestamp(msg);
            }
          }
          // 其他类型跳过
        }
        if (latestAssistantText) {
          lastAssistantFingerprint = makeAssistantFingerprint(latestAssistantText, latestAssistantTs);
        }
        scrollToBottom();
      } catch (err) {
        console.warn('[quick-chat] 加载历史失败:', err);
      }
    }

    // 延迟加载（等 Gateway RPC 就绪）
    setTimeout(loadChatHistory, 500);
    updateSendButtonState();
  </script>
</body>
</html>
