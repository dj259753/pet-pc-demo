<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>对话终端</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --panel-bg: #111317;
      --panel-elev-1: #171a20;
      --panel-elev-2: #1f242d;
      --border: #2a2f3a;
      --border-soft: #232935;
      --primary: #4f7cff;
      --primary-hover: #658dff;
      --text: #e8edf5;
      --text-secondary: #a6b0bf;
      --text-dim: #7f8897;
      --user-bubble: #2a3550;
      --ai-bubble: #1a1f28;
      --radius: 12px;
    }

    html, body {
      height: 100%;
      background: #0d0f13;
      font-family: -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Microsoft YaHei', sans-serif;
      color: var(--text);
      overflow: hidden;
    }

    /* ─── 自绘标题栏 ─── */
    .titlebar {
      -webkit-app-region: drag;
      height: 48px;
      display: flex;
      align-items: center;
      padding: 0 16px 0 80px;
      background: var(--panel-elev-1);
      border-bottom: 1px solid var(--border);
      user-select: none;
      flex-shrink: 0;
    }

    .titlebar-title {
      font-size: 14px;
      font-weight: 600;
      color: var(--text);
      flex: 1;
    }

    .titlebar-subtitle {
      font-size: 11px;
      color: var(--text-secondary);
      margin-left: 8px;
      font-weight: 400;
    }

    .titlebar-btn {
      -webkit-app-region: no-drag;
      width: 28px;
      height: 28px;
      border: none;
      background: var(--panel-elev-2);
      border-radius: 8px;
      border: 1px solid var(--border-soft);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
      color: var(--text-secondary);
      transition: background 0.15s, color 0.15s;
    }

    .titlebar-btn:hover {
      background: #252b36;
      color: var(--text);
    }

    /* ─── 主容器 ─── */
    .container {
      display: flex;
      flex-direction: column;
      height: 100%;
    }

    /* ─── 消息列表 ─── */
    .messages {
      flex: 1;
      overflow-y: auto;
      overflow-x: hidden;
      padding: 14px 18px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      background: var(--panel-bg);
    }

    .messages::-webkit-scrollbar {
      width: 5px;
    }
    .messages::-webkit-scrollbar-track {
      background: transparent;
    }
    .messages::-webkit-scrollbar-thumb {
      background: #343b47;
      border-radius: 3px;
    }
    .messages::-webkit-scrollbar-thumb:hover {
      background: #424a58;
    }

    /* ─── 消息气泡 ─── */
    .msg {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      max-width: 85%;
      animation: msgIn 0.25s ease;
    }

    .msg.user {
      align-self: flex-end;
      flex-direction: row-reverse;
    }

    .msg.ai {
      align-self: flex-start;
    }

    .msg-avatar {
      width: 34px;
      height: 34px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      flex-shrink: 0;
      border: 1px solid var(--border);
    }

    .msg.user .msg-avatar {
      background: #324066;
    }

    .msg.ai .msg-avatar {
      background: #37404e;
    }

    .msg-bubble {
      padding: 10px 12px;
      border-radius: var(--radius);
      font-size: 14px;
      line-height: 1.6;
      word-break: break-word;
      white-space: pre-wrap;
      border: 1px solid var(--border);
    }

    .msg.user .msg-bubble {
      background: var(--user-bubble);
      color: var(--text);
      border: 1px solid #3a4a72;
      border-bottom-right-radius: 6px;
    }

    .msg.ai .msg-bubble {
      background: var(--ai-bubble);
      color: var(--text);
      border: 1px solid var(--border);
      border-bottom-left-radius: 6px;
    }

    /* 思考中动画 */
    .msg.ai .msg-bubble.thinking {
      color: var(--text-secondary);
    }

    .thinking-dots::after {
      content: '';
      animation: dots 1.2s steps(4, end) infinite;
    }

    @keyframes dots {
      0%   { content: ''; }
      25%  { content: '.'; }
      50%  { content: '..'; }
      75%  { content: '...'; }
      100% { content: ''; }
    }

    @keyframes msgIn {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ─── 欢迎占位 ─── */
    .welcome {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 8px;
      color: var(--text-secondary);
      user-select: none;
    }

    .welcome-emoji {
      font-size: 48px;
      margin-bottom: 4px;
      filter: drop-shadow(0 2px 8px rgba(0,0,0,0.2));
    }

    .welcome-text {
      font-size: 15px;
      font-weight: 500;
      color: var(--text);
    }

    .welcome-hint {
      font-size: 12px;
      color: var(--text-dim);
    }

    /* ─── 输入区域 ─── */
    .input-area {
      padding: 12px 16px;
      background: var(--panel-elev-1);
      border-top: 1px solid var(--border);
      display: flex;
      gap: 8px;
      align-items: flex-end;
      flex-shrink: 0;
    }

    .attach-btn {
      width: 40px;
      height: 40px;
      border-radius: 12px;
      border: 1px solid var(--border);
      background: var(--panel-elev-2);
      color: var(--text);
      font-size: 18px;
      cursor: pointer;
      transition: background 0.2s, transform 0.08s;
      flex-shrink: 0;
    }
    .attach-btn:hover { background: #28303c; }
    .attach-btn:active { transform: scale(0.96); }

    .attachments-bar {
      display: none;
      padding: 8px 16px 0;
      gap: 8px;
      flex-wrap: wrap;
      background: var(--panel-elev-1);
    }
    .attachments-bar.visible { display: flex; }

    .att-chip {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      border: 1px solid var(--border);
      background: var(--panel-elev-2);
      border-radius: 10px;
      padding: 4px 8px;
      font-size: 11px;
      color: var(--text);
      max-width: 240px;
    }
    .att-chip-name {
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .att-chip-remove {
      border: none;
      background: transparent;
      color: var(--text-secondary);
      cursor: pointer;
      font-size: 12px;
    }

    .msg-attachments {
      margin-top: 8px;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    .msg-attachment {
      border: 1px solid var(--glass-border);
      background: rgba(255, 255, 255, 0.08);
      border-radius: 10px;
      padding: 6px 8px;
      font-size: 12px;
      color: var(--text);
    }
    .msg-attachment img {
      max-width: 220px;
      max-height: 160px;
      border-radius: 8px;
      display: block;
      margin-top: 6px;
    }

    .input-area textarea {
      flex: 1;
      padding: 10px 14px;
      border: 1px solid var(--border);
      border-radius: 14px;
      font-size: 14px;
      font-family: inherit;
      outline: none;
      background: var(--panel-elev-2);
      color: var(--text);
      resize: none;
      min-height: 40px;
      max-height: 120px;
      line-height: 1.5;
      transition: border-color 0.2s, box-shadow 0.2s, background 0.2s;
    }

    .input-area textarea:focus {
      border-color: #3f67d9;
      background: #232a36;
      box-shadow: 0 0 0 2px rgba(79, 124, 255, 0.22);
    }

    .input-area textarea::placeholder {
      color: var(--text-dim);
    }

    .send-btn {
      padding: 10px 20px;
      background: var(--primary);
      color: #fff;
      border: 1px solid #3d62cd;
      border-radius: 14px;
      font-size: 14px;
      cursor: pointer;
      font-weight: 600;
      white-space: nowrap;
      transition: background 0.2s, transform 0.08s;
      height: 40px;
    }

    .send-btn:hover {
      background: var(--primary-hover);
    }

    .send-btn:active {
      transform: scale(0.96);
    }

    .send-btn:disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }

    /* ─── 快捷键提示 ─── */
    .shortcut-hint {
      font-size: 11px;
      color: var(--text-dim);
      text-align: center;
      padding: 4px 0 8px;
      background: transparent;
      user-select: none;
    }

    kbd {
      background: #232a36;
      border: 1px solid #313846;
      border-radius: 4px;
      padding: 1px 5px;
      font-size: 10px;
      font-family: inherit;
      color: var(--text-secondary);
    }

    /* ─── 富文本：URL 链接 ─── */
    .rich-link {
      color: #60a5fa;
      text-decoration: underline;
      text-underline-offset: 2px;
      word-break: break-all;
      cursor: pointer;
      transition: color 0.15s;
    }
    .rich-link:hover { color: #93c5fd; }

    /* ─── 富文本：本地文件路径 ─── */
    .rich-path {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      background: rgba(99,102,241,0.12);
      border: 1px solid rgba(99,102,241,0.25);
      border-radius: 6px;
      padding: 2px 8px 2px 6px;
      font-size: 12px;
      font-family: 'SF Mono', 'Monaco', 'Menlo', monospace;
      color: #a5b4fc;
      cursor: pointer;
      transition: background 0.15s, border-color 0.15s;
      word-break: break-all;
    }
    .rich-path:hover {
      background: rgba(99,102,241,0.22);
      border-color: rgba(99,102,241,0.5);
      color: #c7d2fe;
    }
    .rich-path-icon { font-style: normal; flex-shrink: 0; }
    .rich-path-text { word-break: break-all; }
  </style>
</head>
<body>
  <div class="container">
    <!-- 自绘标题栏 -->
    <div class="titlebar">
      <span class="titlebar-title">🐧 对话终端<span class="titlebar-subtitle">Cmd+U 唤起</span></span>
      <button class="titlebar-btn" id="btn-clear" title="清空对话">🗑</button>
    </div>

    <!-- 消息列表 -->
    <div class="messages" id="messages">
      <div class="welcome" id="welcome">
        <div class="welcome-emoji">🐧</div>
        <div class="welcome-text">跟企鹅聊聊天吧</div>
        <div class="welcome-hint">输入消息，按 Enter 发送</div>
      </div>
    </div>

    <div class="attachments-bar" id="attachments-bar"></div>

    <!-- 输入区域 -->
    <div class="input-area">
      <button class="attach-btn" id="attach-btn" title="添加本地附件">📎</button>
      <textarea id="input" placeholder="跟企鹅说点什么..." rows="1" autofocus></textarea>
      <button class="send-btn" id="send">发送</button>
    </div>
    <div class="shortcut-hint"><kbd>Enter</kbd> 发送 · <kbd>Shift+Enter</kbd> 换行 · <kbd>Cmd/Ctrl+V</kbd> 粘贴图片 · <kbd>Esc</kbd> 关闭</div>
  </div>

  <script>
    const messagesEl = document.getElementById('messages');
    const welcomeEl = document.getElementById('welcome');
    const inputEl = document.getElementById('input');
    const sendBtn = document.getElementById('send');
    const attachBtn = document.getElementById('attach-btn');
    const attachmentsBar = document.getElementById('attachments-bar');
    const clearBtn = document.getElementById('btn-clear');

    let isWaiting = false;
    let thinkingEl = null;
    let pendingAttachments = [];
    let imeComposing = false;

    // ─── 自动调整输入框高度 ───
    inputEl.addEventListener('input', () => {
      inputEl.style.height = 'auto';
      inputEl.style.height = Math.min(inputEl.scrollHeight, 120) + 'px';
    });

    // ─── 输入法组合态（中文/日文等） ───
    inputEl.addEventListener('compositionstart', () => {
      imeComposing = true;
    });
    inputEl.addEventListener('compositionend', () => {
      imeComposing = false;
    });

    // ─── 发送消息 ───
    function doSend() {
      const text = inputEl.value.trim();
      if ((!text && pendingAttachments.length === 0) || isWaiting) return;

      if (welcomeEl) welcomeEl.style.display = 'none';
      appendMessage('user', text || '[发送了附件]', pendingAttachments);
      window.quickChatAPI.sendMessage(text || '[附件消息]', pendingAttachments);
      inputEl.value = '';
      inputEl.style.height = 'auto';
      pendingAttachments = [];
      renderAttachmentsBar();
      showThinking();
      isWaiting = true;
      sendBtn.disabled = true;
    }

    // ─── 追加消息 ───
    // ─── 富文本渲染（仅用于 AI 消息） ───
    // 识别：URL、绝对文件路径（/...  ~/...）、相对路径（./...）
    function renderRichText(text) {
      const fragment = document.createDocumentFragment();

      // 正则：先匹配 URL，再匹配文件路径，其余为普通文本
      // URL：只允许 ASCII 可打印字符（排除空白、中文、常见结束标点）
      // 路径：/... 或 ~/... 或 ./...，只含 ASCII 路径字符
      const pattern = /(<https?:\/\/[^\s\u4e00-\u9fff\uff00-\uffef>]+>|https?:\/\/[^\s\u4e00-\u9fff\uff00-\uffef<>"')\].,，。！？；：""'']+(?:[.,](?=[^\s\u4e00-\u9fff\uff00-\uffef)])|(?=[^\s\u4e00-\u9fff\uff00-\uffef)]))*|(?:~\/|\/)[A-Za-z0-9_\-\.\/]+)/g;

      let last = 0;
      let match;
      while ((match = pattern.exec(text)) !== null) {
        // 普通文本段
        if (match.index > last) {
          fragment.appendChild(document.createTextNode(text.slice(last, match.index)));
        }

        const raw = match[0];
        // 去掉 Markdown 尖括号包裹 <url>
        const clean = raw.replace(/^<|>$/g, '');

        if (/^https?:\/\//i.test(clean)) {
          // ── URL → 蓝色可点链接 ──
          const a = document.createElement('a');
          a.href = '#';
          a.textContent = clean;
          a.className = 'rich-link';
          a.title = '点击在浏览器中打开';
          a.addEventListener('click', (e) => {
            e.preventDefault();
            window.quickChatAPI?.openUrl(clean);
          });
          fragment.appendChild(a);
        } else {
          // ── 文件路径 → 文件卡片 ──
          const pill = document.createElement('span');
          pill.className = 'rich-path';
          pill.title = '点击用系统打开';
          pill.innerHTML = `<span class="rich-path-icon">📁</span><span class="rich-path-text">${escapeForDisplay(clean)}</span>`;
          pill.addEventListener('click', () => {
            window.quickChatAPI?.openLocalPath(clean);
          });
          fragment.appendChild(pill);
        }

        last = match.index + raw.length;
      }

      // 剩余文本
      if (last < text.length) {
        fragment.appendChild(document.createTextNode(text.slice(last)));
      }

      return fragment;
    }

    function escapeForDisplay(str) {
      return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    }

    function appendMessage(role, text, attachments = []) {
      const msg = document.createElement('div');
      msg.className = `msg ${role}`;

      const avatar = document.createElement('div');
      avatar.className = 'msg-avatar';
      avatar.textContent = role === 'user' ? '👤' : '🐧';

      const bubble = document.createElement('div');
      bubble.className = 'msg-bubble';

      if (role === 'ai') {
        // AI 消息：富文本渲染（链接 + 路径可点击）
        bubble.appendChild(renderRichText(text));
      } else {
        bubble.textContent = text;
      }

      if (attachments.length > 0) {
        const attWrap = document.createElement('div');
        attWrap.className = 'msg-attachments';
        attachments.forEach((att) => {
          const row = document.createElement('div');
          row.className = 'msg-attachment';
          row.textContent = `${att.type === 'image' ? '🖼️' : '📄'} ${att.name || '未命名附件'}`;
          if (att.type === 'image' && att.dataUrl) {
            const img = document.createElement('img');
            img.src = att.dataUrl;
            row.appendChild(img);
          }
          attWrap.appendChild(row);
        });
        bubble.appendChild(attWrap);
      }

      msg.appendChild(avatar);
      msg.appendChild(bubble);
      messagesEl.appendChild(msg);
      scrollToBottom();
    }

    // ─── 思考动画 ───
    function showThinking() {
      const msg = document.createElement('div');
      msg.className = 'msg ai';
      msg.id = 'thinking-msg';

      const avatar = document.createElement('div');
      avatar.className = 'msg-avatar';
      avatar.textContent = '🐧';

      const bubble = document.createElement('div');
      bubble.className = 'msg-bubble thinking';
      bubble.innerHTML = '<span class="thinking-dots">思考中</span>';

      msg.appendChild(avatar);
      msg.appendChild(bubble);
      messagesEl.appendChild(msg);
      thinkingEl = msg;
      scrollToBottom();
    }

    function hideThinking() {
      if (thinkingEl) {
        thinkingEl.remove();
        thinkingEl = null;
      }
    }

    // ─── 接收 AI 回复 ───
    if (window.quickChatAPI && window.quickChatAPI.onAIReply) {
      window.quickChatAPI.onAIReply((text) => {
        hideThinking();
        appendMessage('ai', text);
        isWaiting = false;
        sendBtn.disabled = false;
        inputEl.focus();
      });
    }

    // ─── 接收来自主窗口的用户消息（skill 配置触发、语音识别等） ───
    if (window.quickChatAPI && window.quickChatAPI.onUserMsg) {
      window.quickChatAPI.onUserMsg((text) => {
        if (welcomeEl) welcomeEl.style.display = 'none';
        appendMessage('user', text);
        showThinking();
        isWaiting = true;
        sendBtn.disabled = true;
      });
    }

    // ─── 滚动到底部 ───
    function scrollToBottom() {
      requestAnimationFrame(() => {
        messagesEl.scrollTop = messagesEl.scrollHeight;
      });
    }

    // ─── 清空对话 ───
    clearBtn.addEventListener('click', () => {
      messagesEl.innerHTML = '';
      const w = document.createElement('div');
      w.className = 'welcome';
      w.id = 'welcome';
      w.innerHTML = '<div class="welcome-emoji">🐧</div><div class="welcome-text">跟企鹅聊聊天吧</div><div class="welcome-hint">输入消息，按 Enter 发送</div>';
      messagesEl.appendChild(w);
      isWaiting = false;
      sendBtn.disabled = false;
      hideThinking();
      pendingAttachments = [];
      renderAttachmentsBar();
    });

    // ─── 按键绑定 ───
    sendBtn.addEventListener('click', doSend);

    inputEl.addEventListener('keydown', (e) => {
      // 输入法候选未确认时，Enter 只用于确认上屏，不发送消息
      if (e.key === 'Enter' && (imeComposing || e.isComposing || e.keyCode === 229)) {
        return;
      }
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        doSend();
      }
      if (e.key === 'Escape') {
        window.quickChatAPI.closeWindow();
      }
    });

    attachBtn.addEventListener('click', async () => {
      if (!window.quickChatAPI || !window.quickChatAPI.pickFiles) return;
      const result = await window.quickChatAPI.pickFiles();
      if (!result || !result.ok || !result.files) return;
      result.files.forEach(addAttachment);
      renderAttachmentsBar();
    });

    inputEl.addEventListener('paste', async (e) => {
      const items = e.clipboardData && e.clipboardData.items ? Array.from(e.clipboardData.items) : [];
      const hasImage = items.some(it => it.type && it.type.startsWith('image/'));
      if (!hasImage) return;
      e.preventDefault();
      if (!window.quickChatAPI || !window.quickChatAPI.readClipboardImage) return;
      const res = await window.quickChatAPI.readClipboardImage();
      if (res && res.ok && res.image) {
        addAttachment(res.image);
        renderAttachmentsBar();
      }
    });

    function addAttachment(att) {
      if (!att || !att.name) return;
      const dup = pendingAttachments.some(a => a.name === att.name && a.path === att.path);
      if (!dup) pendingAttachments.push(att);
    }

    function renderAttachmentsBar() {
      attachmentsBar.innerHTML = '';
      if (pendingAttachments.length === 0) {
        attachmentsBar.classList.remove('visible');
        return;
      }
      pendingAttachments.forEach((att, idx) => {
        const chip = document.createElement('div');
        chip.className = 'att-chip';
        const icon = document.createElement('span');
        icon.textContent = att.type === 'image' ? '🖼️' : '📄';
        const nameEl = document.createElement('span');
        nameEl.className = 'att-chip-name';
        nameEl.title = att.path || '';
        nameEl.textContent = att.name;
        const removeBtn = document.createElement('button');
        removeBtn.className = 'att-chip-remove';
        removeBtn.title = '移除';
        removeBtn.textContent = '×';
        removeBtn.addEventListener('click', () => {
          pendingAttachments.splice(idx, 1);
          renderAttachmentsBar();
        });
        chip.appendChild(icon);
        chip.appendChild(nameEl);
        chip.appendChild(removeBtn);
        attachmentsBar.appendChild(chip);
      });
      attachmentsBar.classList.add('visible');
    }

    window.addEventListener('focus', () => {
      setTimeout(() => inputEl.focus(), 50);
    });
  </script>
</body>
</html>
